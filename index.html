  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .editpen{color:var(--dourado);font-size:18px;font-weight:700;padding:0 4px}
  .thumb{width:48px;height:48px;border-radius:9px;background:#f4f4f2;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}

</style>

/* ====== LOGIN ====== */
function lmsg(t,tipo){const e=document.getElementById("loginMsg");if(e){e.className="loginmsg "+(tipo||"");e.innerHTML=t;}}
function mostrarAtivacao(){document.getElementById("formLogin").classList.add("hide");document.getElementById("formAtivar").classList.remove("hide");lmsg("");}
function mostrarLogin(){document.getElementById("formAtivar").classList.add("hide");document.getElementById("formLogin").classList.remove("hide");lmsg("");}
function padCod(c){return String(c||"").replace(/\D/g,"").padStart(3,"0");}

async function entrar(){
  const bruto=String(val("loginCodigo")||"").trim();
  const senha=String(val("loginSenha")||"").trim();
  // administrador do sistema
  if(bruto.toLowerCase()===ADMIN_USER){
    if(senha!==ADMIN_SENHA){lmsg("Senha incorreta","erro");return;}
    iniciarSessao({nome:"Administrador",codigo:"000",id:"admin",admin:true});
    return;
  }
  const cod=padCod(bruto);
  if(!bruto||cod==="000"){lmsg("Digite o código do vendedor","erro");return;}
  if(senha.length!==4){lmsg("A senha tem 4 dígitos","erro");return;}
  lmsg("Verificando…");
  let v=null;
  try{
    if(navigator.onLine){
      const s=await db.ref("vendedores").once("value");
      const arr=toArr(s.val());
      equipe=arr;LS.set("equipe",arr);
      v=arr.find(x=>padCod(x.codigo)===cod);
    }else{
      v=(LS.get("equipe",[])||[]).find(x=>padCod(x.codigo)===cod);
      if(!v){lmsg("Sem internet e esse código nunca entrou neste aparelho","erro");return;}
    }
  }catch(e){lmsg("Erro ao verificar. Tente de novo.","erro");return;}
  if(!v){lmsg("Código não encontrado. Use 'Ativar meu cadastro'.","erro");return;}
  if(v.ativo===false){lmsg("Este vendedor está desativado. Fale com o administrador.","erro");return;}
  if(!v.senha){
    // vendedor cadastrado antes do sistema de senha: define a senha neste primeiro acesso
    if(!navigator.onLine){lmsg("Precisa de internet no primeiro acesso","erro");return;}
    if(!confirm("Primeiro acesso de "+v.nome+".\n\nA senha digitada será cadastrada como a senha deste vendedor. Confirmar?"))return;
    try{await db.ref("vendedores/"+v.id+"/senha").set(senha);v.senha=senha;}
    catch(e){lmsg("Erro ao salvar a senha","erro");return;}
  }
  if(String(v.senha||"")!==senha){lmsg("Senha incorreta","erro");return;}
  iniciarSessao(v);
}
function iniciarSessao(v){
  vendedor=v.nome; vendedorCodigo=padCod(v.codigo); vendedorId=v.id||"";
  ehAdmin = v.admin===true;
  permissoes = ehAdmin?null:(Array.isArray(v.permissoes)&&v.permissoes.length?v.permissoes.slice():ABAS_PADRAO.slice());
  try{
    localStorage.setItem("eiko_vendedor",v.nome);
    localStorage.setItem("eiko_vcod",vendedorCodigo);
    localStorage.setItem("eiko_vid",vendedorId);
    localStorage.setItem("eiko_admin",ehAdmin?"1":"0");
    localStorage.setItem("eiko_perm",JSON.stringify(permissoes));
  }catch(e){}
  document.getElementById("login").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  iniciar();
}
async function ativarApp(){
  const cod=String(val("atvCodigo")||"").trim().toUpperCase();
  const s1=String(val("atvSenha")||"").trim(), s2=String(val("atvSenha2")||"").trim();
  if(!cod){lmsg("Digite o código de ativação","erro");return;}
  if(!/^\d{4}$/.test(s1)){lmsg("A senha deve ter 4 dígitos numéricos","erro");return;}
  if(s1!==s2){lmsg("As senhas não conferem","erro");return;}
  if(!navigator.onLine){lmsg("Precisa de internet para ativar","erro");return;}
  lmsg("Ativando…");
  try{
    const arr=toArr((await db.ref("vendedores").once("value")).val());
    const v=arr.find(x=>String(x.codAtivacao||"").toUpperCase()===cod);
    if(!v){lmsg("Código de ativação inválido. Confira com o administrador.","erro");return;}
    if(v.ativo===false){lmsg("Este acesso foi interrompido pelo administrador.","erro");return;}
    if(v.ativado===true){lmsg("Este código já foi usado. Entre com seu código "+padCod(v.codigo)+" e sua senha.","erro");return;}
    await db.ref("vendedores/"+v.id).update({senha:s1,ativado:true,ativadoEm:new Date().toISOString()});
    lmsg("✅ App ativado! Seu código de acesso é <b style='font-size:22px'>"+padCod(v.codigo)+"</b><br>Guarde — você usa ele e sua senha para entrar.","ok");
    setTimeout(()=>iniciarSessao({...v,senha:s1,ativado:true}),2600);
  }catch(e){lmsg("Não foi possível ativar. Confira o código e tente de novo.","erro");}
}

  document.getElementById("subHeader").textContent=vendedor+(vendedorCodigo?" · cód "+vendedorCodigo:"");
  // 1) carrega o que já está salvo no aparelho — funciona mesmo sem internet
  produtos=LS.get("produtos",[]);
  clientes=LS.get("clientes",[]);

  transportadoras=LS.get("transportadoras",[]);
  agenda=LS.get("agenda",[]);
  fornecedores=LS.get("fornecedores",[]);

  equipe=LS.get("equipe",[]);
  pedidosRemoto=LS.get("pedidos",[]);
  filaPendentes=LS.get("fila",[]);
  reconstruirPedidos();
  // 2) status de rede
  atualizarStatusRede();
  window.addEventListener("online",aoVoltarOnline);
  window.addEventListener("offline",atualizarStatusRede);
  // 3) conecta a nuvem (o SDK reconecta sozinho quando a internet volta)
  conectarFirebase();
  // 4) se já tem internet, envia o que estiver na fila
  if(navigator.onLine)setTimeout(sincronizarAgora,1500);
  irPara(viewAtual);
}
function conectarFirebase(){
  db.ref("produtos").on("value",s=>{const a=toArr(s.val());if(a.length===0){if(produtos.length===0&&navigator.onLine)semear();return;}produtos=a;LS.set("produtos",a);reRender(["produtos","novo"]);});
  db.ref("clientes").on("value",s=>{const a=toArr(s.val());if(a.length===0&&clientes.length>0)return;clientes=a;LS.set("clientes",a);reRender(["clientes","novo"]);});
  db.ref("categorias_cliente").on("value",s=>{const a=toArr(s.val());if(a.length===0&&catCliente.length>0)return;catCliente=a;LS.set("catCliente",a);reRender(["clientes"]);});
  db.ref("categorias_produto").on("value",s=>{const a=toArr(s.val());if(a.length===0&&catProduto.length>0)return;catProduto=a;LS.set("catProduto",a);reRender(["produtos","novo"]);});
  db.ref("tabelas").on("value",s=>{const a=toArr(s.val());if(a.length===0&&tabelas.length>0)return;tabelas=a;LS.set("tabelas",a);reRender(["tabelas"]);if(viewAtual==="novo"&&subAbaPedido==="cab")render();});
  db.ref("transportadoras").on("value",s=>{const a=toArr(s.val());if(a.length===0&&transportadoras.length>0)return;transportadoras=a;LS.set("transportadoras",a);reRender(["transportadoras","novo"]);});
  db.ref("agenda").on("value",s=>{const a=toArr(s.val());if(a.length===0&&agenda.length>0)return;agenda=a;LS.set("agenda",a);reRender(["agenda","home"]);});
  db.ref("fornecedores").on("value",s=>{const a=toArr(s.val());if(a.length===0&&fornecedores.length>0)return;fornecedores=a;LS.set("fornecedores",a);reRender(["fornecedores"]);});
  db.ref("empresa").on("value",s=>{const v=s.val();if(!v&&Object.keys(empresa).length>0)return;empresa=v||{};LS.set("empresa",empresa);reRender(["empresa"]);});
  db.ref("config").on("value",s=>{const v=s.val()||{};if(v.codigoAtivacao)codigoAtivacao=v.codigoAtivacao;reRender(["equipe"]);});
  db.ref("vendedores").on("value",s=>{const a=toArr(s.val());if(a.length===0&&equipe.length>0)return;equipe=a;LS.set("equipe",a);reRender(["equipe"]);});
  db.ref("pedidos").on("value",s=>{const a=toArr(s.val());if(a.length===0&&pedidosRemoto.length>0)return;pedidosRemoto=a;LS.set("pedidos",a);reconstruirPedidos();reRender(["central","clientes","home"]);});
  db.ref("pedidos").on("child_added",s=>{
    const p=s.val();
    if(p&&p.data&&(Date.now()-new Date(p.data).getTime())<8000){
      destaqueId=s.key; if(viewAtual==="central")render();
      setTimeout(()=>{destaqueId=null;if(viewAtual==="central")render();},4000);
    }
  });
}
function reRender(views){if(views.includes(viewAtual))render();}
function reconstruirPedidos(){
  const pend=filaPendentes.filter(f=>f.col==="pedidos").map(f=>({...f.data,id:f.tempId,_pendente:true}));
  pedidos=[...pend,...pedidosRemoto].sort((a,b)=>new Date(b.data)-new Date(a.data));
}
function toArr(o){return o?Object.keys(o).map(k=>({id:k,...o[k]})):[];}
function semear(){const u={};SEED.forEach(p=>{u[db.ref("produtos").push().key]=p;});db.ref("produtos").update(u);}

/* ====== RELATÓRIOS ====== */
function viewRelatorios(){
  const agora=Date.now();
  const limite = periodoRel==="hoje" ? new Date().setHours(0,0,0,0) : (periodoRel==="tudo"?0:agora-parseInt(periodoRel)*86400000);
  const lista=pedidosVis().filter(p=>p.data&&new Date(p.data).getTime()>=limite);
  const totalVend=lista.reduce((s,p)=>s+(p.total||0),0);
  const nPed=lista.length;
  const ticket=nPed?totalVend/nPed:0;
  const nItens=lista.reduce((s,p)=>s+(p.itens||[]).reduce((a,i)=>a+i.qtd,0),0);
  const prodMap={};
  lista.forEach(p=>(p.itens||[]).forEach(i=>{if(!prodMap[i.nome])prodMap[i.nome]={qtd:0,valor:0};prodMap[i.nome].qtd+=i.qtd;prodMap[i.nome].valor+=i.qtd*i.preco;}));
  const topProd=Object.entries(prodMap).sort((a,b)=>b[1].valor-a[1].valor).slice(0,5);
  const cliMap={};
  lista.forEach(p=>{const n=p.cliente||"—";if(!cliMap[n])cliMap[n]={valor:0,ped:0};cliMap[n].valor+=p.total||0;cliMap[n].ped++;});
  const topCli=Object.entries(cliMap).sort((a,b)=>b[1].valor-a[1].valor).slice(0,5);
  const vendMap={};
  lista.forEach(p=>{const n=p.vendedor||"—";if(!vendMap[n])vendMap[n]={valor:0,ped:0};vendMap[n].valor+=p.total||0;vendMap[n].ped++;});
  const vends=Object.entries(vendMap).sort((a,b)=>b[1].valor-a[1].valor);

  const per=[["hoje","Hoje"],["7","7 dias"],["30","30 dias"],["tudo","Tudo"]];
  const chips=`<div class="chips">${per.map(([v,l])=>`<button class="chip ${periodoRel===v?'on':''}" onclick="periodoRel='${v}';render()">${l}</button>`).join("")}</div>`;
  const kpis=`<div class="kpis" style="grid-template-columns:1fr 1fr">
    <div class="kpi"><small>Vendido</small><b>${brl(totalVend)}</b></div>
    <div class="kpi"><small>Pedidos</small><b>${nPed}</b></div>
    <div class="kpi"><small>Ticket médio</small><b>${brl(ticket)}</b></div>
    <div class="kpi"><small>Itens vendidos</small><b>${nItens}</b></div>
  </div>`;
  const rank=(titulo,itens,fmt)=>`<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:8px">${titulo}</div>
    ${itens.length?itens.map((e,i)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0ee;font-size:13px">
      <span style="max-width:62%"><b style="color:var(--dourado)">${i+1}.</b> ${esc(e[0])}</span><span style="text-align:right">${fmt(e[1])}</span></div>`).join(""):'<div style="color:var(--cinza);font-size:13px">Sem dados no período</div>'}
  </div>`;

  return `<h2 class="tit">Relatórios</h2>
    ${chips}${kpis}
    ${rank("🏆 Produtos que mais venderam",topProd,v=>`${v.qtd} un · <b style="color:var(--verde)">${brl(v.valor)}</b>`)}
    ${rank("👥 Clientes que mais compraram",topCli,v=>`${v.ped} ped · <b style="color:var(--verde)">${brl(v.valor)}</b>`)}
    ${vends.length>1?rank("🧑‍💼 Vendas por vendedor",vends,v=>`${v.ped} ped · <b style="color:var(--verde)">${brl(v.valor)}</b>`):""}`;
}

function salvarTransp(){
  const o={nome:val("trNome"),telefone:val("trTel"),cidade:val("trCid")};

    if(transpEdit){const i=transportadoras.findIndex(t=>t.id===transpEdit.id);if(i>=0)transportadoras[i]={...transportadoras[i],...o};filaPendentes.push({col:"transportadoras",op:"update",id:transpEdit.id,data:o});}
    else{const tempId="local_"+Date.now();transportadoras.push({id:tempId,...o});filaPendentes.push({col:"transportadoras",op:"push",data:o,tempId});}
    LS.set("transportadoras",transportadoras);LS.set("fila",filaPendentes);
  }
  transpEdit=null;toast(navigator.onLine?"Transportadora salva":"Salva offline ✓");render();

  const receber=aprazo.filter(p=>!p.recebido);
  const recebidos=aprazo.filter(p=>p.recebido);
  const totalReceber=receber.reduce((s,p)=>s+(p.total||0),0);
  const totalRecebido=recebidos.reduce((s,p)=>s+(p.total||0),0);
  const kpis=`<div class="kpis" style="grid-template-columns:1fr 1fr">
    <div class="kpi"><small>A receber</small><b style="color:#b45309">${brl(totalReceber)}</b></div>
    <div class="kpi"><small>Recebido</small><b>${brl(totalRecebido)}</b></div>

  const filtros=[["areceber","A receber"],["recebidos","Recebidos"],["todos","Todos"]];
  const chips=`<div class="chips">${filtros.map(([v,l])=>`<button class="chip ${filtroCobr===v?'on':''}" onclick="filtroCobr='${v}';render()">${l}</button>`).join("")}</div>`;
  const fonte=filtroCobr==="areceber"?receber:filtroCobr==="recebidos"?recebidos:aprazo;
  const lista=fonte.length===0
    ? `<div class="vazio"><div class="em">💰</div><div>Nada aqui.</div></div>`
    : fonte.slice().sort((a,b)=>new Date(b.data)-new Date(a.data)).map(p=>`<div class="card" style="padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1;min-width:0"><b style="font-size:14px">${esc(p.cliente)}</b>
            <small style="display:block;color:var(--cinza)">${dataBr(p.data)} · ${esc(p.cond||"")}${p.numero?" · Nº "+p.numero:""}</small></div>
          <b style="color:var(--verde);font-size:15px">${brl(p.total)}</b>
        </div>
        <button class="btn ${p.recebido?'btn-g':'btn-v'} btn-sm" style="width:100%;margin-top:8px" onclick="marcarRecebido('${p.id}',${p.recebido?'false':'true'})">
          ${p.recebido?'↩ Marcar como a receber':'✓ Marcar como recebido'}</button>

function marcarRecebido(id,val){
  const p=pedidos.find(x=>x.id===id);

  else{filaPendentes.push({col:"pedidos/"+id,op:"update",id:"pedidos/"+id,data:{recebido:val}});const pr=pedidosRemoto.find(x=>x.id===id);if(pr)pr.recebido=val;LS.set("fila",filaPendentes);reconstruirPedidos();render();}
}

const TIPOS_AG={"Visita":"🚗","Ligação":"📞","Follow-up":"🔁","Cobrança":"💰","Entrega":"📦","Outro":"📌"};
function viewAgenda(){
  const f=agendaEdit||{cliente:"",tipo:"Visita",data:new Date().toISOString().slice(0,10),hora:"",obs:""};
  const cliOpts=clientes.slice().sort((a,b)=>(a.nome||"").localeCompare(b.nome||"")).map(c=>`<option ${f.cliente===c.nome?"selected":""}>${esc(c.nome)}</option>`).join("");
  const tipoOpts=Object.keys(TIPOS_AG).map(t=>`<option ${f.tipo===t?"selected":""}>${t}</option>`).join("");
  const form=`<div class="card">
    <div style="font-weight:700;font-size:14px;margin-bottom:8px">${agendaEdit?"✎ Editar compromisso":"+ Novo compromisso"}</div>
    <label class="lb">Cliente</label>

    </div>
    <div class="fgrid" style="margin-top:8px">
      <div><label class="lb">Hora (opcional)</label><input class="inp" id="agHora" type="time" value="${esc(f.hora||'')}"/></div>
      <div><label class="lb">&nbsp;</label><input class="inp" id="agObs" placeholder="Observação"/></div>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-v" style="flex:1" onclick="salvarAgenda()">${agendaEdit?"Salvar":"Agendar"}</button>
      ${agendaEdit?`<button class="btn btn-g" onclick="agendaEdit=null;render()">✕</button>`:""}
    </div></div>`;
  const filtros=[["proximos","Próximos"],["hoje","Hoje"],["feitos","Feitos"],["todos","Todos"]];
  const chips=`<div class="chips">${filtros.map(([v,l])=>`<button class="chip ${filtroAgenda===v?'on':''}" onclick="filtroAgenda='${v}';render()">${l}</button>`).join("")}</div>`;
  const hoje0=new Date().setHours(0,0,0,0), amanha0=hoje0+86400000;
  const dt=a=>new Date(a.data+"T"+(a.hora||"00:00")).getTime();
  let fonte=agenda.slice();
  if(filtroAgenda==="proximos")fonte=fonte.filter(a=>!a.feito&&dt(a)>=hoje0);
  else if(filtroAgenda==="hoje")fonte=fonte.filter(a=>dt(a)>=hoje0&&dt(a)<amanha0);
  else if(filtroAgenda==="feitos")fonte=fonte.filter(a=>a.feito);
  fonte.sort((a,b)=>dt(a)-dt(b));
  const card=a=>{
    const t=dt(a); const atrasado=!a.feito&&t<hoje0; const ehHoje=t>=hoje0&&t<amanha0;
    const cor=a.feito?"#9ca3af":atrasado?"#dc2626":ehHoje?"var(--dourado)":"var(--verde)";
    return `<div class="card" style="padding:12px;border-left:4px solid ${cor}">

function salvarAgenda(){
  const o={cliente:val("agCli"),tipo:val("agTipo"),data:val("agData"),hora:val("agHora"),obs:val("agObs"),feito:agendaEdit?!!agendaEdit.feito:false};
  if(!o.data){toast("Escolha a data");return;}
  if(navigator.onLine){if(agendaEdit)db.ref("agenda/"+agendaEdit.id).update(o);else db.ref("agenda").push(o);}
  else{if(agendaEdit){const i=agenda.findIndex(a=>a.id===agendaEdit.id);if(i>=0)agenda[i]={...agenda[i],...o};filaPendentes.push({col:"agenda",op:"update",id:agendaEdit.id,data:o});}else{const tempId="local_"+Date.now();agenda.push({id:tempId,...o});filaPendentes.push({col:"agenda",op:"push",data:o,tempId});}LS.set("agenda",agenda);LS.set("fila",filaPendentes);}

}
function marcarAgenda(id,v){if(navigator.onLine)db.ref("agenda/"+id+"/feito").set(v);else{const a=agenda.find(x=>x.id===id);if(a)a.feito=v;LS.set("agenda",agenda);filaPendentes.push({col:"agenda",op:"update",id,data:{feito:v}});LS.set("fila",filaPendentes);render();}}

function boxTransferencia(v){
  const carteira=clientes.filter(c=>padCod(c.vendedorCodigo)===padCod(v.codigo)).length;
  const outros=equipe.filter(x=>x.id!==v.id);

  return `<div style="background:#f8f8f6;border-radius:10px;padding:10px;margin-top:8px">
    <div style="font-size:13px;margin-bottom:6px">Transferir os <b>${carteira}</b> cliente(s) de <b>${esc(v.nome)}</b> para:</div>
    <select class="inp" id="transfPara" style="margin-top:0"><option value="">Selecione o vendedor…</option>
      ${outros.map(x=>`<option value="${x.id}">${padCod(x.codigo)} — ${esc(x.nome)}</option>`).join("")}</select>
    <div class="row" style="margin-top:8px">
      <button class="btn btn-v btn-sm" style="flex:1" onclick="confirmarTransferencia('${v.id}')">✓ Transferir</button>
      <button class="btn btn-g btn-sm" onclick="transfDe=null;render()">Cancelar</button>
    </div>
    <div id="transfProg" style="font-size:12px;margin-top:6px"></div>
  </div>`;
}
function abrirTransferencia(id){transfDe=(transfDe===id?null:id);render();}
async function confirmarTransferencia(idDe){
  const de=equipe.find(v=>v.id===idDe); if(!de)return;
  const idPara=val("transfPara"); if(!idPara){toast("Escolha o vendedor de destino");return;}
  const para=equipe.find(v=>v.id===idPara); if(!para)return;
  if(!navigator.onLine){toast("Precisa estar online");return;}
  const alvo=clientes.filter(c=>padCod(c.vendedorCodigo)===padCod(de.codigo));
  if(!alvo.length){toast("Esse vendedor não tem clientes na carteira");return;}
  if(!confirm("Transferir "+alvo.length+" cliente(s)\n\nDe: "+de.nome+" (cód "+padCod(de.codigo)+")\nPara: "+para.nome+" (cód "+padCod(para.codigo)+")\n\nOs clientes continuam na base geral da empresa. Continuar?"))return;
  const set=t=>{const p=document.getElementById("transfProg");if(p)p.innerHTML=t;};
  try{
    const TAM=300;
    for(let i=0;i<alvo.length;i+=TAM){
      const upd={};
      alvo.slice(i,i+TAM).forEach(c=>{upd[c.id+"/vendedorCodigo"]=padCod(para.codigo);upd[c.id+"/vendedorNome"]=para.nome;});
      await db.ref("clientes").update(upd);
      set("⏳ Transferindo… <b>"+Math.min(i+TAM,alvo.length)+"/"+alvo.length+"</b>");
    }
    set('<span style="color:var(--verde)">✅ '+alvo.length+" cliente(s) transferido(s)</span>");
    toast("Carteira transferida ✓");
    transfDe=null;setTimeout(()=>render(),1400);
  }catch(e){set('<span style="color:#dc2626">Não foi possível concluir</span>');}
}
function toggleAtivo(id,ativar){
  const v=equipe.find(x=>x.id===id); if(!v)return;
  if(!ativar&&!confirm("Desativar "+v.nome+"?\n\nEle não conseguirá mais entrar no app. A carteira dele continua salva."))return;
  db.ref("vendedores/"+id+"/ativo").set(!!ativar);
  toast(ativar?"Vendedor reativado":"Vendedor desativado");
}
function salvarCodigoAtivacao(){
  const c=String(val("cfgAtv")||"").trim();
  if(!c){toast("Digite um código");return;}
  db.ref("config/codigoAtivacao").set(c);
  codigoAtivacao=c;toast("Código de ativação salvo ✓");
}
function salvarVend(){
  const o={nome:val("veNome"),meta:parseFloat(String(val("veMeta")).replace(/\./g,'').replace(',','.'))||0};
  if(!o.nome){toast("Informe o nome");return;}
  if(!ehAdmin){toast("Somente o administrador pode cadastrar vendedores");return;}
  const senha=String(val("veSenha")||"").trim();
  if(!vendEdit&&!/^\d{4}$/.test(senha)){toast("Defina a senha de 4 dígitos");return;}
  if(senha&&!/^\d{4}$/.test(senha)){toast("A senha deve ter 4 dígitos");return;}
  if(senha)o.senha=senha;
  const marcadas=[];
  try{document.querySelectorAll(".permChk").forEach(ch=>{if(ch.checked)marcadas.push(ch.value);});}catch(e){}
  o.permissoes=marcadas.length?marcadas:ABAS_PADRAO.slice();
  if(!vendEdit){o.codAtivacao=gerarCodAtivacao();o.ativado=false;}
  let cod=padCod(val("veCod"));
  if(!val("veCod")){
    const maior=equipe.reduce((m,x)=>Math.max(m,parseInt(padCod(x.codigo))||0),0);
    cod=padCod(String(maior+1));
  }
  if(equipe.some(x=>padCod(x.codigo)===cod&&(!vendEdit||x.id!==vendEdit.id))){toast("Já existe vendedor com o código "+cod);return;}
  o.codigo=cod;
  if(!vendEdit)o.ativo=true;
  if(navigator.onLine){if(vendEdit)db.ref("vendedores/"+vendEdit.id).update(o);else db.ref("vendedores").push(o);}
  else{if(vendEdit){const i=equipe.findIndex(x=>x.id===vendEdit.id);if(i>=0)equipe[i]={...equipe[i],...o};filaPendentes.push({col:"vendedores",op:"update",id:vendEdit.id,data:o});}else{const tempId="local_"+Date.now();equipe.push({id:tempId,...o});filaPendentes.push({col:"vendedores",op:"push",data:o,tempId});}LS.set("equipe",equipe);LS.set("fila",filaPendentes);}
  vendEdit=null;toast(navigator.onLine?"Vendedor salvo":"Salvo offline ✓");render();
}

  if(equipe.some(v=>v.codAtivacao===s))return gerarCodAtivacao();

function chaveDup(c){
  const cnpj=soDig(c.cnpj||"");
  if(cnpj.length>=11)return "d:"+cnpj;
  return "n:"+String(c.nome||"").toLowerCase().replace(/\s+/g," ").trim()+"|"+String(c.cidade||"").toLowerCase().trim();
}
function contarDuplicados(){
  const vistos=new Set(); let dup=0;
  clientes.forEach(c=>{const k=chaveDup(c);if(vistos.has(k))dup++;else vistos.add(k);});
  return dup;
}
async function limparDuplicados(){
  if(!navigator.onLine){toast("Precisa estar online");return;}
  const vistos=new Map(), remover=[];
  clientes.forEach(c=>{
    const k=chaveDup(c);
    if(vistos.has(k)){
      // mantém o registro mais completo
      const antigo=vistos.get(k);
      const peso=x=>Object.values(x).filter(v=>v!==""&&v!=null).length;
      if(peso(c)>peso(antigo)){remover.push(antigo.id);vistos.set(k,c);}
      else remover.push(c.id);
    }else vistos.set(k,c);
  });
  if(!remover.length){toast("Nenhum duplicado encontrado ✓");return;}
  if(!confirm("Encontrei "+remover.length+" cliente(s) duplicado(s).\n\nVou manter "+vistos.size+" cliente(s) e remover as cópias.\n\nContinuar?"))return;
  const set=t=>{const p=document.getElementById("impProg");if(p)p.innerHTML=t;};
  const btn=document.getElementById("btnDup");if(btn)btn.disabled=true;
  try{
    const TAM=400;
    for(let i=0;i<remover.length;i+=TAM){
      const upd={};
      remover.slice(i,i+TAM).forEach(id=>{upd[id]=null;});
      await db.ref("clientes").update(upd);
      set("⏳ Removendo duplicados… <b>"+Math.min(i+TAM,remover.length)+"/"+remover.length+"</b>");
    }
    set("✅ Pronto! "+remover.length+" duplicado(s) removido(s). Restaram <b>"+vistos.size+"</b> clientes.");
    toast("Duplicados removidos ✓");
    setTimeout(()=>render(),1500);
  }catch(e){set('<span style=\'color:#dc2626\'>❌ Não foi possível concluir. Tente novamente.</span>');if(btn)btn.disabled=false;}
}
function normalizarBase(dados,nome){
  let cli=[],ped=[];
  if(Array.isArray(dados)){
    // lista simples: decide se é cliente ou pedido pelo formato
    const am=dados[0]||{};
    if(am.total!==undefined||am.numero!==undefined)ped=dados; else cli=dados;
  }else if(dados&&typeof dados==="object"){
    cli=dados.clientes||dados.clients||[];
    ped=dados.pedidos||dados.orders||[];
  }
  return {nome:nome,clientes:cli.filter(c=>c&&c.nome),pedidos:ped};
}
function lerArquivoBase(inp){
  const f=inp.files&&inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const base=normalizarBase(JSON.parse(r.result),f.name);
      if(!base.clientes.length&&!base.pedidos.length){toast("Arquivo sem clientes reconhecidos");return;}
      baseCarregada=base;modoImport="add";render();
    }catch(e){toast("Arquivo de base inválido");}
  };
  r.onerror=()=>toast("Não consegui ler o arquivo");
  r.readAsText(f);
}
async function carregarBaseSite(){
  const nome=(val("nomeBaseSite")||"").trim(); if(!nome){toast("Digite o nome do arquivo");return;}
  if(!navigator.onLine){toast("Precisa estar online");return;}
  const set=t=>{const p=document.getElementById("impProg");if(p)p.innerHTML=t;};

async function confirmarBase(){
  if(!baseCarregada)return;

    : "Adicionar "+b.clientes.length+" cliente(s)"+(b.pedidos.length?" e "+b.pedidos.length+" pedido(s)":"")+" ao app?";

  }catch(e){importando=false;set('<span style=\'color:#dc2626\'>❌ Não foi possível concluir. Tente novamente.</span>');if(btn)btn.disabled=false;}
}
async function gravarLotes(col,arr,set,label){
  const TAM=300;
  for(let i=0;i<arr.length;i+=TAM){
    const lote=arr.slice(i,i+TAM), upd={};
    lote.forEach(item=>{upd[db.ref(col).push().key]=item;});
    await db.ref(col).update(upd);
    set("⏳ Importando "+label+"… <b>"+Math.min(i+TAM,arr.length)+"/"+arr.length+"</b>");
  }
}

function precoComTabela(p){
  const base=Number(p.atacado)||0;
  const t=tabelas.find(x=>x.nome===ped.tabela);
  if(!t)return base;
  const perc=parseFloat(t.percentual)||0;
  return t.tipo==="desconto"?base*(1-perc/100):base*(1+perc/100);
}
function calcTotais(){
  const bruto=Object.entries(carrinho).reduce((s,[id,it])=>s+(it.qtd*it.preco),0);
  const perc=parseFloat(ped.descPerc)||0;
  const total=ped.descTipo==="desc"?bruto*(1-perc/100):bruto*(1+perc/100);
  const qtd=Object.values(carrinho).reduce((s,it)=>s+it.qtd,0);
  return {bruto,total,qtd,perc};
}

  const itens=linhas.map(([id,it])=>{
    const p=produtos.find(x=>x.id===id); if(!p) return "";
    return `<div class="pitem" onclick="abrirEditor('${id}')" style="cursor:pointer">
      <div class="nome"><b>${esc(p.nome)}</b><small>${it.qtd} × ${brl(it.preco)} = <b style="color:var(--verde)">${brl(it.qtd*it.preco)}</b></small></div>
      <div style="display:flex;gap:6px;align-items:center">

function calcItem(){
  const t=(parseFloat(itemQtd)||0)*(parseFloat(itemPreco)||0);
  const el=document.getElementById("itTotal"); if(el) el.textContent=brl(t);
}
function salvarItem(){
  const q=parseFloat(itemQtd)||0, pr=parseFloat(itemPreco)||0;
  if(q<=0){toast("Informe a quantidade");return;}
  carrinho[itemEditando]={qtd:q,preco:pr};
  itemEditando=null; buscaItem=false; subAbaPedido="itens";
  toast("Item adicionado"); render();
}
function removerItem(id){delete carrinho[id];render();}
function addItem(id,d){ // ajuste rápido +/- (mantido por compatibilidade)
  const p=produtos.find(x=>x.id===id);
  const cur=carrinho[id]||{qtd:0,preco:p?p.atacado:0};
  const q=cur.qtd+d;
  if(q<=0)delete carrinho[id];else carrinho[id]={qtd:q,preco:cur.preco};
  render();
}

function renderBarra(){
  const {total,qtd,perc}=calcTotais();
  if(qtd===0)return;
  const b=document.getElementById("barraTotal");b.classList.remove("hide");
  const descTxt=perc>0?`<span style="font-size:11px;color:var(--cinza)"> (${ped.descTipo==='desc'?'-':'+'}${perc}%)</span>`:"";
  b.innerHTML=`<div class="in">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="color:var(--cinza);font-size:13px">${qtd} item(s)${descTxt}</span>
      <span style="font-size:20px;font-weight:800;color:var(--verde)">${brl(total)}</span></div>
    <div class="row">
      <button class="btn btn-g" style="flex:1" onclick="finalizar(false)">${editandoPedido?"✓ Salvar alterações":"✓ Salvar"}</button>
      ${editandoPedido?`<button class="btn btn-r" onclick="cancelarEdicao()">Cancelar</button>`:`<button class="btn btn-w" style="flex:1" onclick="finalizar(true)">Salvar + WhatsApp</button>`}

}

function finalizar(enviar){
  if(!clienteSel){toast("Escolha um cliente");subAbaPedido="cab";render();return;}
  if(!ped.cond){toast("Escolha a condição de pagamento");subAbaPedido="cab";render();return;}
  const linhas=Object.entries(carrinho);
  if(linhas.length===0){toast("Adicione itens");subAbaPedido="itens";render();return;}
  const cli=clientes.find(c=>c.id===clienteSel);
  const itens=linhas.map(([id,it])=>{const p=produtos.find(x=>x.id===id);return{nome:p.nome,codigo:p.codigo||"",qtd:it.qtd,preco:it.preco};});
  const {bruto,total}=calcTotais();
  const numero=editandoPedido?editandoPedido.numero:(pedidos.reduce((m,p)=>Math.max(m,p.numero||0),1000)+1);
  const pedido={
    numero,
    clienteId:clienteSel,cliente:cli.nome,cidade:cli.cidade||"",whats:cli.whatsapp||"",categoria:cli.categoria||"",
    vendedor,vendedorCodigo,itens,bruto,total,
    status:"aberto",tipo:ped.status,cond:ped.cond,forma:ped.forma,tabela:ped.tabela||"",
    descTipo:ped.descTipo,descPerc:parseFloat(ped.descPerc)||0,
    consumidorFinal:ped.consumidorFinal,dataEmissao:ped.dataEmissao,dataFat:ped.dataFat,previsao:ped.previsao,
    obsCli:ped.obsCli,obsEmp:ped.obsEmp,ordemCompra:ped.ordemCompra,transportadora:ped.transportadora,
    data:new Date().toISOString()
  };
  if(editandoPedido){
    const alvo=pedidos.find(p=>p.id===editandoPedido.id)||{};
    pedido.data=alvo.data||pedido.data;
    pedido.editadoEm=new Date().toISOString();
    pedido.editadoPor=vendedor;
    if(editandoPedido.pendente){
      // ainda na fila: atualiza o item pendente
      const f=filaPendentes.find(x=>x.tempId===editandoPedido.id||x.tempId===editandoPedido.tempId);
      if(f)f.data={...f.data,...pedido};
      LS.set("fila",filaPendentes);
      reconstruirPedidos();
    }else if(navigator.onLine){
      db.ref("pedidos/"+editandoPedido.id).update(pedido);
    }else{
      filaPendentes.push({col:"pedidos",op:"update",id:editandoPedido.id,data:pedido});
      LS.set("fila",filaPendentes);
    }
    toast("Pedido "+numero+" atualizado ✓");
    editandoPedido=null;
  }else if(navigator.onLine){
    db.ref("pedidos").push(pedido);
  }else{
    const tempId="local_"+Date.now();
    filaPendentes.push({col:"pedidos",data:pedido,tempId,quando:Date.now()});
    LS.set("fila",filaPendentes);
    reconstruirPedidos();
  }
  if(enviar){const alvo=soDig(cli.whatsapp)?("55"+soDig(cli.whatsapp).replace(/^55/,"")):WHATS_EMPRESA;window.open(`https://wa.me/${alvo}?text=${encodeURIComponent(textoPedido(pedido))}`,"_blank");}
  // reset
  carrinho={};clienteSel="";subAbaPedido="cab";buscaItem=false;buscaItemTxt="";filtroItemCat="";itemEditando=null;
  ped={status:"Pedido",consumidorFinal:false,dataEmissao:new Date().toISOString().slice(0,10),dataFat:"",previsao:"",cond:"",forma:"",tabela:"",descTipo:"desc",descPerc:"",obsCli:"",obsEmp:"",ordemCompra:"",transportadora:""};
  toast(navigator.onLine?"Pedido enviado!":"Pedido salvo no celular — envia quando a internet voltar");render();
}

function textoPedido(o){
  let t="*PEDIDO EIKOVIDA*\n";
  if(o.tipo&&o.tipo!=="Pedido")t+="["+o.tipo+"]\n";
  t+="Cliente: "+o.cliente+"\n";
  if(o.cidade)t+="Cidade: "+o.cidade+"\n";
  t+="Vendedor: "+o.vendedor+"\n";
  if(o.cond)t+="Cond. pagto: "+o.cond+"\n";
  if(o.forma)t+="Forma: "+o.forma+"\n";
  t+="\n";
  o.itens.forEach(i=>t+=i.qtd+"x "+i.nome+" — "+brl(i.qtd*i.preco)+"\n");
  if(o.descPerc>0)t+="\n"+(o.descTipo==="desc"?"Desconto":"Acréscimo")+": "+o.descPerc+"%";
  t+="\n*TOTAL: "+brl(o.total)+"*";
  if(o.obsCli)t+="\n\nObs: "+o.obsCli;
  return t;
}

/* ====== CENTRAL ====== */
function viewCentral(){
  const base=pedidosVis();
  const hoje=new Date().toDateString();
  const hj=base.filter(p=>p.data&&new Date(p.data).toDateString()===hoje);
  const fat=base.reduce((s,p)=>s+(p.total||0),0);
  const abertos=base.filter(p=>p.status==="aberto").length;
  const tipo=t=>base.filter(p=>(p.status||"Pedido")===t);
  const soma=a=>a.reduce((s,p)=>s+(p.total||0),0);
  const peds=base.filter(p=>!p.status||p.status==="Pedido"||p.status==="aberto"||p.status==="enviado");
  const orc=tipo("Orçamento"), tro=tipo("Troca"), bon=tipo("Bonificação");
  const linha=(n,lbl,v)=>`<div class="resumo-l"><span>${n} ${lbl}</span><b>${brl(v)}</b></div>`;
  const kpis=`<div class="resumo">
    ${linha(peds.length,"pedidos",soma(peds))}
    ${orc.length?linha(orc.length,"orçamentos",soma(orc)):""}
    ${tro.length?linha(tro.length,"trocas",soma(tro)):""}
    ${bon.length?linha(bon.length,"bonificações",soma(bon)):""}
    <div class="resumo-l" style="border-top:1px solid rgba(255,255,255,.25);margin-top:4px;padding-top:6px"><span>Hoje: ${hj.length} pedido(s)</span><b>${brl(soma(hj))}</b></div>
  </div>`;
  if(base.length===0)return `<h2 class="tit">Central de pedidos</h2>${kpis}<div class="vazio"><div class="em">📋</div><div>Nenhum pedido ainda.</div></div>`;
  const busca=`<input class="inp" id="buscaCentralInp" placeholder="🔍 Buscar por cliente ou nº do pedido" value="${esc(buscaCentral)}" oninput="filtrarCentral(this.value)" style="margin-bottom:10px">`;
  return `<h2 class="tit">Central de pedidos (${base.length})${ehAdmin?' <span style="font-size:12px;color:var(--dourado)">· todos os vendedores</span>':""}</h2>${kpis}${busca}<div id="listaCentral">${htmlListaCentral()}</div>`;
}
function htmlListaCentral(){
  const q=(buscaCentral||"").toLowerCase().trim();
  let arr=pedidosVis().slice().sort((a,b)=>new Date(b.data||0)-new Date(a.data||0));
  if(q)arr=arr.filter(o=>((o.cliente||"")+" "+(o.numero||"")+" "+(o.cidade||"")).toLowerCase().includes(q));
  const total=arr.length, LIM=50, mostra=arr.slice(0,LIM);
  if(total===0)return `<div class="vazio">Nenhum pedido encontrado.</div>`;

    const det=o.id===pedidoAberto?`<div class="det">
        ${(o.itens||[]).map(i=>`<div class="li"><span>${i.qtd}x ${esc(i.nome)}</span><span>${brl(i.qtd*i.preco)}</span></div>`).join("")}

        ${cli.fantasia?`<div class="pcsub">${esc(cli.fantasia)}</div>`:""}
        ${cli.cnpj?`<div class="pcsub">CNPJ: ${esc(cli.cnpj)}</div>`:""}
        <div class="pcrow"><span>${dataBr(o.data)}</span><b>${brl(o.total)}</b><span class="pcst">${esc(o.status==="Orçamento"||o.status==="Bonificação"||o.status==="Troca"?o.status:"Pedido")}</span></div>

      </div>${o._pendente?'':det}</div>`;
  }).join("");
  const aviso=total>LIM?`<div style="text-align:center;color:var(--cinza);font-size:12px;padding:12px">Mostrando os ${LIM} mais recentes de ${total}. Use a busca para achar outros.</div>`:"";
  return lista+aviso;
}

function gerarPDF(id){
  const m=pdfMarkup(id); if(!m)return;
  const doc=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>Pedido ${m.num}</title></head><body>${m.inner}</body></html>`;
  const w=window.open("","_blank");
  if(!w){toast("Permita pop-ups para gerar o PDF");return;}
  w.document.write(doc); w.document.close();
  w.onload=()=>setTimeout(()=>w.print(),400);
}

function carregarLogo(){
  return new Promise(res=>{
    try{
      const img=new Image(); img.crossOrigin="anonymous";
      img.onload=()=>{try{const cv=document.createElement("canvas");cv.width=img.naturalWidth;cv.height=img.naturalHeight;cv.getContext("2d").drawImage(img,0,0);res({data:cv.toDataURL("image/png"),w:img.naturalWidth,h:img.naturalHeight});}catch(e){res(null);}};
      img.onerror=()=>res(null);
      img.src="logo.png";
    }catch(e){res(null);}
  });
}

async function enviarPDFwhats(id){
  const o=pedidos.find(x=>x.id===id); if(!o)return;
  if(!window.jspdf||!window.jspdf.jsPDF){toast("Sem conexão — conecte para gerar o PDF");return;}
  toast("Gerando PDF…");
  let logo=null; try{logo=await carregarLogo();}catch(_){ }
  let doc; try{doc=construirPDFjs(id,logo);}catch(e){toast("Erro ao gerar PDF");return;}
  if(!doc){toast("Erro ao gerar PDF");return;}
  const num=o.numero||id;
  const blob=doc.output("blob");
  const file=new File([blob],"Pedido-"+num+".pdf",{type:"application/pdf"});
  const legenda="Segue seu pedido "+num+" — "+(empresa.razao||"EIKO VIDA");
  try{
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"Pedido "+num,text:legenda});
    }else{
      doc.save("Pedido-"+num+".pdf");
      const alvo=soDig(o.whats)?("55"+soDig(o.whats).replace(/^55/,"")):WHATS_EMPRESA;
      setTimeout(()=>{window.open("https://wa.me/"+alvo+"?text="+encodeURIComponent(legenda+" (anexe o PDF que acabou de baixar)."),"_blank");},600);
      toast("PDF baixado — anexe no WhatsApp");
    }
  }catch(e){ if(e&&e.name==="AbortError")return; toast("Não consegui compartilhar. PDF será baixado."); try{doc.save("Pedido-"+num+".pdf");}catch(_){ } }
}

function htmlListaClientes(){
  const q=(buscaCli||"").toLowerCase().trim();
  let lista=clientes.filter(c=>!filtroCli||c.categoria===filtroCli);
  if(escopoCli==="meus")lista=lista.filter(c=>String(c.vendedorCodigo||"")===String(vendedorCodigo));
  if(q)lista=lista.filter(c=>((c.nome||"")+" "+(c.fantasia||"")+" "+(c.cidade||"")+" "+(c.cnpj||"")).toLowerCase().includes(q));
  const total=lista.length, LIM=60;
  lista=lista.slice().sort((a,b)=>(a.nome||"").localeCompare(b.nome||""));
  const mostra=lista.slice(0,LIM);
  if(total===0)return `<div class="vazio"><div class="em">👥</div><div>Nenhum cliente encontrado.</div></div>`;
  const cards=mostra.map(c=>`<div class="lista-cli" onclick="verCliente('${c.id}')"><div class="info"><b>${esc(c.nome)}</b>
        <small>${[esc(c.cidade),esc(c.whatsapp)].filter(Boolean).join(" · ")}${c.vendedorCodigo?` · <span style="color:var(--verde)">cód ${esc(c.vendedorCodigo)}</span>`:""}</small></div>
        ${c.categoria?`<span class="badge b-cat">${esc(c.categoria)}</span>`:""}
        <button class="icbtn btn-g" onclick="event.stopPropagation();editarCli('${c.id}')">✎</button></div>`).join("");
  const aviso=total>LIM?`<div style="text-align:center;color:var(--cinza);font-size:12px;padding:12px">Mostrando ${LIM} de ${total}. Use a busca para achar outros.</div>`:"";
  return cards+aviso;
}
function filtrarClientes(q){buscaCli=q;const el=document.getElementById("listaClientes");if(el)el.innerHTML=htmlListaClientes();}

function salvarCli(){
  const o={nome:val("cNome"),fantasia:val("cFant"),ie:val("cIe"),categoria:val("cCat"),tabela:val("cTab"),
    cnpj:val("cCnpj"),whatsapp:val("cWhats"),limite:parseFloat(String(val("cLimite")).replace(/\./g,'').replace(',','.'))||0,
    email:val("cEmail"),cep:val("cCep"),numero:val("cNum"),endereco:val("cEnd"),bairro:val("cBairro"),
    complemento:val("cCompl"),cidade:val("cCidade"),uf:val("cUf"),obs:val("cObs")};
  if(!o.nome){toast("Informe o nome");return;}
  if(!editCli){o.vendedorCodigo=vendedorCodigo||"";o.vendedorNome=vendedor||"";o.criadoEm=new Date().toISOString();}
  if(navigator.onLine){
    if(editCli){db.ref("clientes/"+editCli.id).update(o);}else db.ref("clientes").push(o);
  }else{
    if(editCli){
      const i=clientes.findIndex(c=>c.id===editCli.id);if(i>=0)clientes[i]={...clientes[i],...o};
      filaPendentes.push({col:"clientes",op:"update",id:editCli.id,data:o});
    }else{
      const tempId="local_"+Date.now();
      clientes.push({id:tempId,...o});
      filaPendentes.push({col:"clientes",op:"push",data:o,tempId});
    }
    LS.set("clientes",clientes);LS.set("fila",filaPendentes);
  }
  editCli=null;
  toast(navigator.onLine?"Cliente salvo":"Cliente salvo offline ✓");render();
}
function setV(id,v){const e=document.getElementById(id);if(e&&v)e.value=v;}
async function buscarCNPJ(){
  const cnpj=soDig(val("cCnpj"));
  if(cnpj.length!==14){toast("CNPJ deve ter 14 dígitos");return;}
  toast("Buscando CNPJ…");
  try{
    const r=await fetch("https://brasilapi.com.br/api/cnpj/v1/"+cnpj);
    if(!r.ok)throw new Error("nao encontrado");
    const d=await r.json();
    setV("cNome",d.razao_social);
    setV("cFant",d.nome_fantasia);
    setV("cCep",d.cep);
    setV("cEnd",d.logradouro);
    setV("cNum",d.numero);
    setV("cBairro",d.bairro);
    setV("cCidade",d.municipio);
    setV("cUf",d.uf);
    setV("cCompl",d.complemento);
    if(d.ddd_telefone_1)setV("cWhats",d.ddd_telefone_1);
    if(d.email)setV("cEmail",(d.email||"").toLowerCase());
    toast("Dados preenchidos ✓");
  }catch(e){toast("CNPJ não encontrado");}

function lerFoto(inp){
  const f=inp.files&&inp.files[0]; if(!f)return;
  toast("Preparando foto\u2026");
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      else if(h>=w&&h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      const ctx=cv.getContext("2d");
      ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      let q=0.72,dados=cv.toDataURL("image/jpeg",q);
      while(dados.length>140000&&q>0.35){q-=0.1;dados=cv.toDataURL("image/jpeg",q);}
      fotoTmp=dados;render();
      toast("Foto pronta \u2713 ("+Math.round(dados.length/1024)+" KB)");
    };
    img.onerror=()=>toast("N\u00e3o consegui abrir a imagem");
    img.src=r.result;
  };
  r.onerror=()=>toast("N\u00e3o consegui ler o arquivo");
  r.readAsDataURL(f);
}

function viewTabelas(){
  const f=tabEdit||{nome:"",tipo:"acrescimo",percentual:""};
  const form=`<div class="card">
    <div style="font-weight:700;font-size:14px;margin-bottom:8px">${tabEdit?"✎ Editar tabela":"+ Nova tabela de preço"}</div>
    <label class="lb">Nome da tabela</label>
    <input class="inp" id="tNome" placeholder="Ex: Farmácia, Produto Natural, Distribuidor" value="${esc(f.nome)}"/>
    <div class="fgrid" style="margin-top:10px">
      <div><label class="lb">Tipo</label>
        <select class="inp" id="tTipo">
          <option value="acrescimo" ${f.tipo==="acrescimo"?"selected":""}>Acréscimo (+)</option>
          <option value="desconto" ${f.tipo==="desconto"?"selected":""}>Desconto (−)</option>
        </select></div>
      <div><label class="lb">Percentual (%)</label>
        <input class="inp" id="tPerc" type="number" inputmode="decimal" placeholder="Ex: 15" value="${f.percentual}"/></div>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-v" style="flex:1" onclick="salvarTabela()">${tabEdit?"Salvar alterações":"Criar tabela"}</button>
      ${tabEdit?`<button class="btn btn-g" onclick="tabEdit=null;render()">✕</button>`:""}
    </div>
  </div>`;
  const info=`<div style="font-size:12px;color:var(--cinza);background:#f8f8f6;border-radius:10px;padding:10px;margin-bottom:12px">
    A tabela ajusta o <b>preço base</b> dos produtos pelo percentual. No pedido, escolha a tabela (ou associe uma ao cliente) e os preços já entram ajustados.</div>`;
  const lista=tabelas.length===0
    ? `<div class="vazio"><div class="em">💲</div><div>Nenhuma tabela ainda.</div></div>`
    : tabelas.map(t=>{
        const sinal=t.tipo==="desconto"?"−":"+";
        const cor=t.tipo==="desconto"?"#b45309":"var(--verde)";
        return `<div class="lista-cli">
          <div class="info"><b>${esc(t.nome)}</b><small>${t.tipo==="desconto"?"Desconto":"Acréscimo"} sobre o preço base</small></div>
          <span style="font-weight:800;color:${cor};font-size:16px">${sinal}${esc(String(t.percentual))}%</span>
          <button class="icbtn btn-g" onclick="editarTabela('${t.id}')">✎</button>
          <button class="icbtn btn-r" onclick="excluirTabela('${t.id}')">🗑</button>
        </div>`;
      }).join("");
  // exemplo prático
  const exemplo=tabelas.length?`<div style="font-size:12px;color:var(--cinza);margin-top:10px;text-align:center">
    Ex: produto de ${brl(30)} → ${tabelas.map(t=>{const perc=parseFloat(t.percentual)||0;const v=t.tipo==="desconto"?30*(1-perc/100):30*(1+perc/100);return esc(t.nome)+": "+brl(v);}).join(" · ")}</div>`:"";
  return `<h2 class="tit">Tabelas de preço</h2>${info}${form}${lista}${exemplo}`;
}
function salvarTabela(){
  const o={nome:val("tNome"),tipo:document.getElementById("tTipo").value,percentual:parseFloat(String(val("tPerc")).replace(',','.'))||0};
  if(!o.nome){toast("Informe o nome da tabela");return;}
  if(tabEdit){db.ref("tabelas/"+tabEdit.id).update(o);tabEdit=null;toast("Tabela atualizada");}
  else{db.ref("tabelas").push(o);toast("Tabela criada");}
  render();
}
function editarTabela(id){tabEdit=tabelas.find(t=>t.id===id);render();window.scrollTo(0,0);}
function excluirTabela(id){if(confirm("Excluir tabela?"))db.ref("tabelas/"+id).remove();}
