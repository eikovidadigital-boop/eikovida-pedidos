<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#2F6B4F" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" href="icon-192.png?v=6" />
<link rel="apple-touch-icon" href="icon-192.png?v=6" />
<title>EikoVida Pedidos</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  :root{
    --verde:#2F6B4F; --verde-esc:#245239; --dourado:#C9A227; --whats:#25D366;
    --bg:#f4f4f2; --card:#ffffff; --borda:#e7e5e1; --txt:#2b2b2b; --cinza:#8a8a85;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt)}
  button{font-family:inherit;cursor:pointer;border:none}
  input,select,textarea{font-family:inherit;font-size:16px}
  .hide{display:none!important}

  #login{position:fixed;inset:0;background:linear-gradient(135deg,var(--verde),var(--verde-esc));display:flex;align-items:center;justify-content:center;padding:24px;z-index:100}
  #login .box{background:#fff;border-radius:20px;padding:28px 22px;width:100%;max-width:360px;text-align:center}
  #login .logo{width:64px;height:64px;border-radius:50%;background:var(--verde);color:#F5E9C8;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;margin:0 auto 12px;overflow:hidden}
  #login .logo img{width:100%;height:100%;object-fit:contain}
  #login h1{font-size:20px;margin-bottom:4px}
  #login p{color:var(--cinza);font-size:13px;margin-bottom:18px}
  #login input{width:100%;padding:13px;border:1px solid var(--borda);border-radius:12px;margin-bottom:12px}
  #login button{width:100%;padding:13px;background:var(--verde);color:#fff;border-radius:12px;font-weight:700;font-size:15px}

  header{position:sticky;top:0;background:var(--verde);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.12)}
  header .logo{width:44px;height:44px;border-radius:50%;background:#fff;color:#333;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;overflow:hidden;padding:2px;flex-shrink:0}
  header .logo img{width:100%;height:100%;object-fit:contain;display:block}
  header .titulo{font-weight:700;font-size:17px;line-height:1.1}
  header .sub{font-size:11px;opacity:.85}
  header .live{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;background:rgba(255,255,255,.15);padding:4px 9px;border-radius:20px}
  header .dot{width:7px;height:7px;border-radius:50%;background:#7CFC9A;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  main{max-width:900px;margin:0 auto;padding:14px 14px 90px}
  body.com-barra main{padding-bottom:190px}
  .hbtn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 6px 0 0;line-height:1}
  .cli-box{border:1px solid var(--borda);border-radius:10px;margin-top:6px;max-height:290px;overflow-y:auto;background:#fff}
  .cli-op{padding:10px 12px;border-bottom:1px solid #f2f2f0;cursor:pointer}
  .cli-op:last-child{border-bottom:none}
  .cli-op:active{background:#eef6ef}
  .cli-op b{display:block;font-size:14px;line-height:1.25}
  .cli-op small{color:var(--cinza);font-size:12px}
  .cli-sel{display:flex;align-items:center;gap:10px;background:#eef6ef;border:1px solid var(--verde);border-radius:10px;padding:10px 12px;margin-top:4px}
  .cli-sel>div{flex:1;min-width:0}
  .cli-sel b{display:block;font-size:14px;line-height:1.25}
  .cli-sel small{color:#557;font-size:12px}
  .voltar{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--borda);border-radius:10px;color:var(--verde);font-size:16px;font-weight:700;cursor:pointer;padding:10px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:18px 18px 0 0;z-index:51;max-height:86vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.2);animation:sobe .2s ease-out}
  @keyframes sobe{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-h{padding:16px;border-bottom:1px solid var(--borda);font-weight:700;font-size:15px}
  .sheet-h small{display:block;font-weight:400;font-size:12px;color:var(--cinza);margin-top:2px}
  .sheet-i{display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid #f4f4f2;font-size:15px;cursor:pointer}
  .sheet-i:active{background:#f2f9f2}
  .sheet-i.destaque{background:#eef6ef;font-weight:700;color:var(--verde);border-bottom:2px solid var(--verde)}
  .sheet-i.aceitar{background:#f0fdf4;font-weight:800;color:#15803d;border-bottom:2px solid #22c55e}
  .sheet-i.off{opacity:.45;cursor:not-allowed}
  .sheet-i span{font-size:19px;width:24px;text-align:center}
  @media(min-width:700px){.sheet{left:50%;right:auto;bottom:auto;top:50%;transform:translate(-50%,-50%);width:420px;border-radius:16px;animation:none}}
  .voltar:active{background:#eef6ef}
  .linkbox{margin-top:14px;text-align:center}
  .linkbox span{color:var(--verde);font-size:14px;font-weight:600;cursor:pointer;text-decoration:underline}
  .avisoAtv{background:#f8f8f6;border-radius:10px;padding:10px;font-size:13px;color:#555;margin-bottom:10px;text-align:center}
  .loginmsg{margin-top:12px;font-size:14px;text-align:center;min-height:20px}
  .loginmsg.erro{color:#dc2626;font-weight:600}
  .loginmsg.ok{color:var(--verde);font-weight:600}
  .resumo{background:#5b6470;color:#fff;border-radius:12px;padding:12px 14px;margin-bottom:14px}
  .resumo-l{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:2px 0}
  .resumo-l b{font-size:14px}
  .pedcard{background:#fff;border:1px solid var(--borda);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer}
  .pedcard.novo{border-color:var(--verde);box-shadow:0 0 0 2px rgba(47,107,79,.15)}
  .pedcard .pcnum{font-size:13px;color:#333;margin-bottom:5px}
  .pedcard .pcnum b{font-size:14px}
  .pedcard .pccli{font-weight:700;font-size:14px;line-height:1.25}
  .pedcard .pcsub{font-size:12px;color:#555;line-height:1.35}
  .pedcard .pcrow{display:flex;justify-content:space-between;align-items:center;margin-top:7px;font-size:13px;color:#666}
  .pedcard .pcrow b{color:#111;font-size:15px}
  .pedcard .pcst{color:#2563EB;font-weight:700}
  .pedcard .pcrow2{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-top:2px}
  .drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;opacity:0;pointer-events:none;transition:.2s}
  .drawer-ov.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;left:0;bottom:0;width:280px;max-width:84%;background:#fff;z-index:31;transform:translateX(-102%);transition:transform .25s;overflow-y:auto;box-shadow:2px 0 14px rgba(0,0,0,.25)}
  .drawer.on{transform:translateX(0)}
  .drawer .dhead{background:var(--verde);color:#fff;padding:20px 16px}
  .drawer .dhead b{font-size:17px;display:block;letter-spacing:.5px}
  .drawer .dhead small{opacity:.9;font-size:12px}
  .drawer .ditem{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid #f2f2f0;cursor:pointer;font-size:14px;color:#333}
  .drawer .ditem .di{font-size:18px;width:22px;text-align:center}
  .drawer .ditem.on{background:#eef6ef;color:var(--verde);font-weight:700}
  .drawer .dsep{padding:8px 16px 4px;font-size:10px;text-transform:uppercase;color:#aaa;letter-spacing:.5px;background:#fafafa}
  h2.tit{font-size:16px;margin-bottom:12px;font-weight:800}
  .card{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:14px;margin-bottom:12px}
  label.lb{font-size:11px;font-weight:700;color:var(--cinza);text-transform:uppercase;letter-spacing:.4px}
  .inp{width:100%;padding:12px;border:1px solid var(--borda);border-radius:11px;background:#fff;margin-top:5px}
  textarea.inp{resize:vertical;min-height:44px}
  .btn{padding:12px 14px;border-radius:11px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn-v{background:var(--verde);color:#fff}
  .btn-o{background:var(--dourado);color:#333}
  .btn-w{background:var(--whats);color:#fff}
  .btn-g{background:#fff;border:1px solid var(--borda);color:var(--txt)}
  .btn-r{background:#fde8e8;color:#d33}
  .btn-sm{padding:8px 10px;font-size:13px}
  .row{display:flex;gap:8px}

  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
  .chip{white-space:nowrap;padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;background:#fff;border:1px solid var(--borda);color:var(--cinza)}
  .chip.on{background:var(--verde);color:#fff;border-color:var(--verde)}
  .chip-x{display:inline-flex;align-items:center;gap:6px;background:#eef3ef;color:var(--verde);border:1px solid #d5e4da;padding:6px 10px;border-radius:20px;font-size:13px;font-weight:600}
  .chip-x span{cursor:pointer;font-weight:800;opacity:.6}

  .pitem{background:#fff;border:1px solid var(--borda);border-radius:11px;padding:10px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .pitem .nome{flex:1;min-width:0}
  .pitem .nome b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pitem .nome small{color:var(--cinza);font-size:12px}
  .qtd{display:flex;align-items:center;gap:8px}
  .qbtn{width:32px;height:32px;border-radius:9px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .qbtn.mais{background:var(--verde);color:#fff}
  .qbtn.menos{background:#eee;color:#333}
  .qnum{min-width:20px;text-align:center;font-weight:800}

  #barraTotal{position:fixed;bottom:64px;left:0;right:0;background:#fff;border-top:1px solid var(--borda);padding:10px 14px;z-index:15}
  #barraTotal .in{max-width:900px;margin:0 auto}

  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:#fff;border:1px solid var(--borda);border-radius:12px;padding:12px}
  .kpi small{font-size:11px;color:var(--cinza)}
  .kpi b{display:block;font-size:18px;color:var(--verde);margin-top:2px}

  .ped{background:#fff;border:1px solid var(--borda);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .ped .top{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
  .ped .cli{flex:1;min-width:0}
  .ped .cli b{display:block;font-size:14px}
  .ped .cli small{color:var(--cinza);font-size:12px}
  .ped .tot{font-weight:800;color:var(--verde);font-size:14px}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .b-aberto{background:#fef3c7;color:#b45309}
  .b-enviado{background:#dcfce7;color:#15803d}
  .b-cat{background:#eef3ef;color:var(--verde)}
  .ped .det{padding:0 14px 14px;border-top:1px solid #f0f0ee;padding-top:10px}
  .ped .det .li{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
  .ped .pag{font-size:12px;color:var(--cinza);margin-top:6px}
  .novo{box-shadow:inset 4px 0 0 var(--dourado);background:#fffdf5}
  .tagnovo{font-size:9px;font-weight:800;color:#fff;background:var(--dourado);padding:2px 6px;border-radius:20px;margin-left:6px}

  .lista-cli{background:#fff;border:1px solid var(--borda);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
  .lista-cli .info{flex:1;min-width:0}
  .lista-cli .info b{font-size:14px}
  .lista-cli .info small{display:block;color:var(--cinza);font-size:12px}
  .icbtn{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

  .vazio{text-align:center;color:var(--cinza);padding:40px 20px}
  .vazio .em{font-size:36px;opacity:.4}

  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--borda);display:flex;z-index:18}
  nav button{flex:1;padding:9px 4px;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--cinza);font-size:10px;font-weight:600}
  nav button.on{color:var(--verde)}
  nav button .ic{font-size:20px}

  #toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:#2b2b2b;color:#fff;font-size:13px;padding:9px 16px;border-radius:20px;z-index:50;opacity:0;transition:opacity .25s;pointer-events:none}
  #toast.show{opacity:1}

  #instalar{position:fixed;bottom:74px;right:14px;background:var(--dourado);color:#333;padding:10px 14px;border-radius:24px;font-weight:700;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:30;display:flex;align-items:center;gap:6px}

  .catbox{background:#f8f8f6;border:1px dashed var(--borda);border-radius:12px;padding:12px;margin-bottom:12px}
  .catbox .hd{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;cursor:pointer}

  .totbar{background:#fff7e6;border:1px solid #f0e2c0;border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .totbar span{font-size:12px;color:var(--cinza)}
  .totbar b{color:var(--verde);font-size:15px}
  .subabas{display:flex;background:#eef0ee;border-radius:11px;padding:4px;gap:4px}
  .subaba{flex:1;padding:9px;border-radius:8px;background:transparent;font-weight:700;font-size:13px;color:var(--cinza)}
  .subaba.on{background:var(--verde);color:#fff}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fgrid .lb{margin-bottom:0}
  .editpen{color:var(--dourado);font-size:18px;font-weight:700;padding:0 4px}
  .thumb{width:48px;height:48px;border-radius:9px;background:#f4f4f2;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}
  .thumb img{width:100%;height:100%;object-fit:contain}
  .relbusca{margin-bottom:10px}
  .homewrap{padding:2px}
  .homehead{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 14px;font-size:16px}
  .homehead span{font-size:13px;color:var(--cinza)}
  .homegrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .homecard{background:#fff;border:1px solid var(--borda);border-radius:16px;padding:16px 6px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .homecard:active{transform:scale(.96)}
  .homeic{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px}
  .hometit{font-size:12px;font-weight:600;color:#333;text-align:center;line-height:1.2}
  .pendbar{background:#fff7e6;border:1px solid #f0d488;color:#92600a;border-radius:10px;padding:10px;font-size:13px;font-weight:600;text-align:center;margin-bottom:12px}
  /* atalho flutuante + filtro + foto ampliada */
  .fab{position:fixed;right:14px;bottom:18px;z-index:25;background:var(--verde);color:#fff;border:none;padding:14px 20px;border-radius:28px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,.25);cursor:pointer}
  .filtrobox{background:#fff;border:1px solid var(--borda);border-radius:14px;padding:12px;margin-bottom:10px}
  .filtrobox .lb{font-size:11px;color:var(--cinza);font-weight:600}
  .fltop{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .fbtn{border:1px solid var(--borda);background:#fff;border-radius:11px;padding:11px 13px;font-size:14px;font-weight:700;color:var(--verde);white-space:nowrap;cursor:pointer}
  .fbtn.on{background:var(--verde);color:#fff;border-color:var(--verde)}
  .lbx-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  .lbx-ov img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:10px;background:#fff}
  .lbx-bar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center}

  .selorep{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;overflow:hidden;margin-right:14px;vertical-align:middle;padding:3px;background:#fff!important;border:1px solid var(--borda);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .selorep img{width:100%;height:100%;object-fit:contain;background:transparent;display:block}
  .selorep i{width:100%;height:100%;align-items:center;justify-content:center;color:var(--verde);font-size:10px;font-weight:800;font-style:normal}
  /* itens do pedido */
  .pedcard .det{padding:0 14px 14px;border-top:1px solid #f0f0ee;padding-top:10px}
  .pedcard .pag{font-size:12px;color:var(--cinza);margin-top:6px}
  .itbox{background:#fafaf8;border:1px solid var(--borda);border-radius:10px;overflow:hidden;margin-bottom:10px}
  .ithead{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#f1f0ec;font-size:11px;font-weight:700;color:var(--cinza);text-transform:uppercase;letter-spacing:.3px}
  .itlin{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;border-top:1px solid #ececea}
  .itq{flex-shrink:0;min-width:34px;text-align:center;background:var(--verde);color:#fff;border-radius:6px;font-size:12px;font-weight:800;padding:3px 5px;line-height:1.3}
  .itnome{flex:1;min-width:0;font-size:13px;line-height:1.35;word-break:break-word}
  .itun{display:block;font-size:11px;color:var(--cinza);margin-top:1px}
  .itval{flex-shrink:0;text-align:right;font-size:13px;font-weight:700;white-space:nowrap;padding-left:4px}
  .ittot{display:flex;justify-content:space-between;padding:9px 10px;border-top:2px solid #e2e0da;background:#f1f0ec;font-size:13px;font-weight:800}
  /* ====== COMPUTADOR (telas largas) ====== */
  @media (min-width:1024px){
    body.pc header{padding:14px 26px}
    body.pc header .hbtn{display:none}
    body.pc header .titulo{font-size:18px}
    body.pc .drawer{transform:none!important;top:62px;width:248px;max-width:248px;box-shadow:none;border-right:1px solid var(--borda);background:#fff}
    body.pc .drawer .dhead{display:none}
    body.pc .drawer-ov{display:none!important}
    body.pc .drawer .ditem{padding:11px 18px;font-size:13.5px}
    body.pc .drawer .ditem:hover{background:#f4f8f4}
    body.pc main{margin-left:248px;max-width:none;padding:22px 30px 90px}
    body.pc.com-barra main{padding-bottom:200px}
    body.pc .pcwrap{max-width:1180px;margin:0 auto}
    body.pc .tit{font-size:20px}
    body.pc .homegrid{grid-template-columns:repeat(4,1fr);gap:16px}
    body.pc .homecard{padding:22px 10px}
    body.pc .homewrap{max-width:1180px;margin:0 auto}
    body.pc .colunas{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;align-items:start}
    body.pc .colunas .pedcard,body.pc .colunas .lista-cli{margin-bottom:0}
    body.pc .pedcard{transition:box-shadow .15s,border-color .15s}
    body.pc .pedcard:hover{box-shadow:0 3px 12px rgba(0,0,0,.09);border-color:#cfd6cf}
    body.pc .card{max-width:760px}
    body.pc .fab{right:32px;bottom:28px;padding:15px 24px;font-size:15px}
    body.pc .fgrid{grid-template-columns:1fr 1fr 1fr}
    body.pc .chips{flex-wrap:wrap}

  // administrador do sistema
  if(bruto.toLowerCase()===ADMIN_USER){
    if(senha!==admSenha&&senha!==ADMIN_SENHA_PADRAO){lmsg("Senha incorreta","erro");return;}
    iniciarSessao({nome:"Administrador",codigo:"000",id:"admin",admin:true});
    return;
  }
  const cod=padCod(bruto);
  if(!bruto||cod==="000"){lmsg("Digite o código do vendedor","erro");return;}
  if(!/^\d{4,6}$/.test(senha)){lmsg("A senha tem de 4 a 6 dígitos","erro");return;}
  lmsg("Verificando…");
  if(navigator.onLine)await aguardarAcesso(9000);
  let v=null;
  try{
    if(navigator.onLine){
      const s=await db.ref("vendedores").once("value");
      const arr=toArr(s.val());
      equipe=arr;LS.set("equipe",arr);
      v=arr.find(x=>padCod(x.codigo)===cod);
    }else{
      v=(LS.get("equipe",[])||[]).find(x=>padCod(x.codigo)===cod);
      if(!v){lmsg("Sem internet e esse código nunca entrou neste aparelho","erro");return;}
    }
  }catch(e){lmsg("Erro ao verificar. Tente de novo.","erro");return;}
  if(!v){lmsg("Código não encontrado. Use 'Ativar meu cadastro'.","erro");return;}
  if(v.ativo===false){lmsg("Este vendedor está desativado. Fale com o administrador.","erro");return;}
  if(!v.senha){
    // vendedor cadastrado antes do sistema de senha: define a senha neste primeiro acesso
    if(!navigator.onLine){lmsg("Precisa de internet no primeiro acesso","erro");return;}
    if(!confirm("Primeiro acesso de "+v.nome+".\n\nA senha digitada será cadastrada como a senha deste vendedor. Confirmar?"))return;
    try{await db.ref("vendedores/"+v.id+"/senha").set(senha);v.senha=senha;}
    catch(e){lmsg("Erro ao salvar a senha","erro");return;}
  }
  if(String(v.senha||"")!==senha){lmsg("Senha incorreta","erro");return;}
  iniciarSessao(v);
}
function iniciarSessao(v){
  vendedor=v.nome; vendedorCodigo=padCod(v.codigo); vendedorId=v.id||"";
  ehAdmin = v.admin===true;
  permissoes = ehAdmin?null:(Array.isArray(v.permissoes)&&v.permissoes.length?v.permissoes.slice():ABAS_PADRAO.slice());
  try{
    localStorage.setItem("eiko_vendedor",v.nome);
    localStorage.setItem("eiko_vcod",vendedorCodigo);
    localStorage.setItem("eiko_vid",vendedorId);
    localStorage.setItem("eiko_admin",ehAdmin?"1":"0");
    localStorage.setItem("eiko_perm",JSON.stringify(permissoes));
  }catch(e){}
  document.getElementById("login").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  iniciar();iniciarAutoSync();
}
async function ativarApp(){
  const cod=String(val("atvCodigo")||"").trim().toUpperCase();
  const s1=String(val("atvSenha")||"").trim(), s2=String(val("atvSenha2")||"").trim();
  if(!cod){lmsg("Digite o código de ativação","erro");return;}
  if(!/^\d{6}$/.test(s1)){lmsg("A senha deve ter 6 dígitos numéricos","erro");return;}
  if(s1!==s2){lmsg("As senhas não conferem","erro");return;}
  if(!navigator.onLine){lmsg("Precisa de internet para ativar","erro");return;}
  lmsg("Ativando…");
  await aguardarAcesso(9000);
  try{
    const arr=toArr((await db.ref("vendedores").once("value")).val());
    const v=arr.find(x=>String(x.codAtivacao||"").toUpperCase()===cod);
    if(!v){lmsg("Código de ativação inválido. Confira com o administrador.","erro");return;}
    if(v.ativo===false){lmsg("Este acesso foi interrompido pelo administrador.","erro");return;}
    if(v.ativado===true){lmsg("Este código já foi usado. Entre com seu código "+padCod(v.codigo)+" e sua senha.","erro");return;}
    await db.ref("vendedores/"+v.id).update({senha:s1,ativado:true,ativadoEm:new Date().toISOString()});
    lmsg("✅ App ativado! Seu código de acesso é <b style='font-size:22px'>"+padCod(v.codigo)+"</b><br>Guarde — você usa ele e sua senha para entrar.","ok");
    setTimeout(()=>iniciarSessao({...v,senha:s1,ativado:true}),2600);
  }catch(e){lmsg("Não foi possível ativar. Confira o código e tente de novo.","erro");}
}

  viewAtual=validas.includes(ultima)?ultima:(window.innerWidth>=900?"central":"home");
  document.getElementById("subHeader").textContent=vendedor+(vendedorCodigo?" · cód "+vendedorCodigo:"");
  // 1) carrega o que já está salvo no aparelho — funciona mesmo sem internet
  produtos=LS.get("produtos",[]);

function conectarFirebase(){
  if(!acessoPronto){quandoAcesso(conectarFirebase);return;}
  db.ref("produtos").on("value",s=>{const a=toArr(s.val());if(a.length===0){if(produtos.length===0&&navigator.onLine)semear();return;}produtos=a;LS.set("produtos",a);reRender(["produtos","novo"]);});
  db.ref("clientes").on("value",s=>{const a=toArr(s.val());if(a.length===0&&clientes.length>0)return;clientes=a;LS.set("clientes",a);_cliIdx=null;pedidos.forEach(p=>{p._cidade=undefined;p._categoria=undefined;});reRender(["clientes","novo","central"]);});
  db.ref("categorias_cliente").on("value",s=>{const a=toArr(s.val());if(a.length===0&&catCliente.length>0)return;catCliente=a;LS.set("catCliente",a);reRender(["clientes"]);});
  db.ref("categorias_produto").on("value",s=>{const a=toArr(s.val());if(a.length===0&&catProduto.length>0)return;catProduto=a;LS.set("catProduto",a);reRender(["produtos","novo","catprod"]);});
  db.ref("tabelas").on("value",s=>{const a=toArr(s.val());if(a.length===0&&tabelas.length>0)return;tabelas=a;LS.set("tabelas",a);reRender(["tabelas"]);if(viewAtual==="novo"&&subAbaPedido==="cab")render();});
  db.ref("representadas").on("value",s=>{repres=toArr(s.val());LS.set("representadas",repres);reRender(["representadas","produtos","novo","convites"]);});
  db.ref("transportadoras").on("value",s=>{const a=toArr(s.val());if(a.length===0&&transportadoras.length>0)return;transportadoras=a;LS.set("transportadoras",a);reRender(["transportadoras","novo"]);});
  db.ref("agenda").on("value",s=>{const a=toArr(s.val());if(a.length===0&&agenda.length>0)return;agenda=a;LS.set("agenda",a);reRender(["agenda","home"]);});
  db.ref("fornecedores").on("value",s=>{const a=toArr(s.val());if(a.length===0&&fornecedores.length>0)return;fornecedores=a;LS.set("fornecedores",a);reRender(["fornecedores"]);});
  db.ref("empresa").on("value",s=>{const v=s.val();if(!v&&Object.keys(empresa).length>0)return;empresa=v||{};LS.set("empresa",empresa);reRender(["empresa"]);});
  db.ref("catalogo").on("value",s=>{cfgCatalogo=s.val()||{};reRender(["catalogoCfg"]);});
  db.ref("config").on("value",s=>{const v=s.val()||{};if(v.codigoAtivacao)codigoAtivacao=v.codigoAtivacao;if(v.admSenha)admSenha=v.admSenha;reRender(["equipe"]);});
  db.ref("vendedores").on("value",s=>{const a=toArr(s.val());if(a.length===0&&equipe.length>0)return;equipe=a;LS.set("equipe",a);reRender(["equipe"]);});
  db.ref("pedidos").on("value",s=>{const a=toArr(s.val());if(a.length===0&&pedidosRemoto.length>0)return;pedidosRemoto=a;LS.set("pedidos",a);reconstruirPedidos();reRender(["central","clientes","home"]);});
  db.ref("pedidos").on("child_added",s=>{
    const p=s.val();
    if(p&&p.data&&(Date.now()-new Date(p.data).getTime())<8000){
      destaqueId=s.key; if(viewAtual==="central")render();
      setTimeout(()=>{destaqueId=null;if(viewAtual==="central")render();},4000);
    }
  });
}

function itensDe(o){const i=o&&o.itens;if(Array.isArray(i))return i;if(i&&typeof i==="object")return Object.keys(i).sort((a,b)=>a-b).map(k=>i[k]);return [];}

function sw(){return navigator.serviceWorker&&navigator.serviceWorker.controller;}
async function listaDeFotos(){
  const urls=new Set();
  try{
    const r=await fetch("fotos.json?v="+Date.now());
    if(r.ok){const d=await r.json();(d.arquivos||[]).forEach(a=>urls.add(a));}
  }catch(e){}
  produtos.forEach(p=>{const c=String(p.codigo||"").trim();if(c)urls.add(galUrl(c,1,"jpg"));});
  representadas().forEach(r=>{const s=slugRep(r);if(s)urls.add("logos/"+s+".png");});
  return [...urls];
}
async function guardarFotos(forcar,silencioso){
  if(!navigator.onLine){if(!silencioso)toast("Conecte-se à internet para baixar as fotos");return;}
  if(!sw()){if(!silencioso)toast("Recurso indisponível neste aparelho");return;}
  if(fotosBaixando)return;
  const urls=await listaDeFotos();
  if(!urls.length){if(!silencioso)toast("Nenhuma foto encontrada");return;}
  fotosBaixando=true;fotosProg=0;
  if(!silencioso){toast("Baixando "+urls.length+" fotos\u2026");render();}
  sw().postMessage({tipo:"guardar-fotos",urls,forcar:!!forcar});
}
(function(){
  if(!navigator.serviceWorker)return;
  navigator.serviceWorker.addEventListener("message",e=>{
    const d=e.data||{};
    if(d.tipo==="fotos-progresso"){fotosProg=Math.round(d.feitas/d.total*100);const el=document.getElementById("fotosProg");if(el)el.textContent=fotosProg+"%";}
    if(d.tipo==="fotos-prontas"){
      fotosBaixando=false;fotosProg=100;
      fotosEstado={qtd:d.ok,total:d.total,quando:Date.now()};
      LS.set("fotosEstado",fotosEstado);
      toast(d.ok+" foto(s) dispon\u00edveis sem internet \u2713");
      render();
    }
  });
})();

  const dias=Math.floor((Date.now()-fotosEstado.quando)/86400000);

function imgLogo(nome,estilo){

function lerLogoRep(input){
  const f=input.files&&input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const m=520,esc2=Math.min(1,m/Math.max(img.width,img.height));
      const cv=document.createElement("canvas");cv.width=img.width*esc2;cv.height=img.height*esc2;
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      logoTmp=cv.toDataURL("image/png");render();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
}
function ampliarLogoRep(nome){

}
function excluirRepres(id){
  const r=repres.find(x=>x.id===id); if(!r)return;
  const nProd=produtos.filter(p=>(p.marca||"")===r.nome).length;
  const nPed=pedidos.filter(p=>(p.representada||"")===r.nome).length;
  if(!confirm("Excluir a representada "+r.nome+"?"+(nProd||nPed?"\n\n\u26a0\ufe0f "+nProd+" produto(s) e "+nPed+" pedido(s) continuam com esse nome gravado.":"")))return;

}

function periodoRelLista(){
  const agora=Date.now();
  const limite = periodoRel==="hoje" ? new Date().setHours(0,0,0,0) : (periodoRel==="tudo"||periodoRel==="custom"?0:agora-parseInt(periodoRel)*86400000);
  const dtP=p=>String(p.dataEmissao||p.data||"").slice(0,10);
  if(periodoRel==="custom")return pedidosVis().filter(p=>{const d=dtP(p);return d&&(!periodoDe||d>=periodoDe)&&(!periodoAte||d<=periodoAte);});
  return pedidosVis().filter(p=>p.data&&new Date(p.data).getTime()>=limite);
}
function viewRelatorios(){
  const agora=Date.now();
  const limite = periodoRel==="hoje" ? new Date().setHours(0,0,0,0) : (periodoRel==="tudo"||periodoRel==="custom"?0:agora-parseInt(periodoRel)*86400000);
  const dtP=p=>String(p.dataEmissao||p.data||"").slice(0,10);
  let lista=pedidosVis().filter(p=>p.data&&new Date(p.data).getTime()>=limite);
  if(periodoRel==="custom"){
    lista=pedidosVis().filter(p=>{const d=dtP(p);return d&&(!periodoDe||d>=periodoDe)&&(!periodoAte||d<=periodoAte);});
  }
  const totalVend=lista.reduce((s,p)=>s+(p.total||0),0);
  const nPed=lista.length;
  const ticket=nPed?totalVend/nPed:0;
  const nItens=lista.reduce((s,p)=>s+itensDe(p).reduce((a,i)=>a+i.qtd,0),0);
  const prodMap={};
  lista.forEach(p=>itensDe(p).forEach(i=>{if(!prodMap[i.nome])prodMap[i.nome]={qtd:0,valor:0};prodMap[i.nome].qtd+=i.qtd;prodMap[i.nome].valor+=i.qtd*i.preco;}));
  const topProd=Object.entries(prodMap).sort((a,b)=>b[1].valor-a[1].valor).slice(0,5);
  const cliMap={};
  lista.forEach(p=>{const n=p.cliente||"—";if(!cliMap[n])cliMap[n]={valor:0,ped:0};cliMap[n].valor+=p.total||0;cliMap[n].ped++;});
  const topCli=Object.entries(cliMap).sort((a,b)=>b[1].valor-a[1].valor).slice(0,5);
  const vendMap={};
  lista.forEach(p=>{const n=p.vendedor||"—";if(!vendMap[n])vendMap[n]={valor:0,ped:0};vendMap[n].valor+=p.total||0;vendMap[n].ped++;});
  const vends=Object.entries(vendMap).sort((a,b)=>b[1].valor-a[1].valor);

  const per=[["hoje","Hoje"],["7","7 dias"],["30","30 dias"],["tudo","Tudo"],["custom","\ud83d\udcc5 Escolher período"]];
  const chips=`<div class="chips">${per.map(([v,l])=>`<button class="chip ${periodoRel===v?'on':''}" onclick="abrirPeriodo('${v}')">${l}</button>`).join("")}</div>`
    +(periodoRel==="custom"?`<div class="filtrobox">
      <div class="fgrid">
        <div><label class="lb">De</label><input class="inp" type="date" id="relDe" value="${esc(periodoDe)}" onchange="periodoDe=this.value;render()"></div>
        <div><label class="lb">Até</label><input class="inp" type="date" id="relAte" value="${esc(periodoAte)}" onchange="periodoAte=this.value;render()"></div>
      </div>
      <div style="font-size:12px;color:var(--cinza);margin-top:8px">${(periodoDe||periodoAte)?("Mostrando "+(periodoDe?dataBr(periodoDe):"o início")+" até "+(periodoAte?dataBr(periodoAte):"hoje")):"Escolha as datas para filtrar."}</div>
      <div class="row" style="margin-top:8px"><button class="btn btn-g btn-sm" style="flex:1" onclick="periodoDe='';periodoAte='';render()">Limpar datas</button></div>
    </div>`:"");
  const kpis=`<div class="kpis" style="grid-template-columns:1fr 1fr">
    <div class="kpi"><small>Vendido</small><b>${brl(totalVend)}</b></div>
    <div class="kpi"><small>Pedidos</small><b>${nPed}</b></div>
    <div class="kpi"><small>Ticket médio</small><b>${brl(ticket)}</b></div>
    <div class="kpi"><small>Itens vendidos</small><b>${nItens}</b></div>
  </div>`;
  const rank=(titulo,itens,fmt)=>`<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:8px">${titulo}</div>
    ${itens.length?itens.map((e,i)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0ee;font-size:13px">
      <span style="max-width:62%"><b style="color:var(--dourado)">${i+1}.</b> ${esc(e[0])}</span><span style="text-align:right">${fmt(e[1])}</span></div>`).join(""):'<div style="color:var(--cinza);font-size:13px">Sem dados no período</div>'}
  </div>`;

  return `<h2 class="tit">Relatórios</h2>
    ${chips}${kpis}
    ${blocoConsultaCliente(lista)}
    ${rank("🏆 Produtos que mais venderam",topProd,v=>`${v.qtd} un · <b style="color:var(--verde)">${brl(v.valor)}</b>`)}
    ${rank("👥 Clientes que mais compraram",topCli,v=>`${v.ped} ped · <b style="color:var(--verde)">${brl(v.valor)}</b>`)}
    ${vends.length>1?rank("🧑‍💼 Vendas por vendedor",vends,v=>`${v.ped} ped · <b style="color:var(--verde)">${brl(v.valor)}</b>`):""}`;
}

function viewCobrancas(){

  const totalRecebido=recebidos.reduce((s,p)=>s+(p.total||0),0);
  const kpis=`<div class="kpis" style="grid-template-columns:1fr 1fr">
    <div class="kpi"><small>A receber</small><b style="color:#b45309">${brl(totalReceber)}</b></div>
    <div class="kpi"><small>Recebido</small><b>${brl(totalRecebido)}</b></div>
  </div>`;
  const filtros=[["areceber","A receber"],["recebidos","Pagos"],["todos","Todos"]];
  const chips=`<div class="chips">${filtros.map(([v,l])=>`<button class="chip ${filtroCobr===v?'on':''}" onclick="filtroCobr='${v}';render()">${l}</button>`).join("")}</div>`;
  let fonte=filtroCobr==="areceber"?receber:filtroCobr==="recebidos"?recebidos:aprazo;
  if(buscaCobr.trim()){
    const q=txtSimples(buscaCobr);
    fonte=fonte.filter(p=>txtSimples(p.cliente).includes(q)||String(p.numero||"").includes(buscaCobr.trim()));
  }
  const lista=fonte.length===0
    ? `<div class="vazio"><div class="em">💰</div><div>Nada aqui.</div></div>`
    : fonte.slice().sort((a,b)=>new Date(b.data)-new Date(a.data)).map(p=>`<div class="card" style="padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1;min-width:0"><b style="font-size:14px">${esc(p.cliente)}</b>
            <small style="display:block;color:var(--cinza)">${dataBr(p.data)} · ${esc(p.cond||"")}${p.numero?" · Nº "+p.numero:""}</small></div>
          <b style="color:var(--verde);font-size:15px">${brl(p.total)}</b>
        </div>
        <div class="row" style="margin-top:8px">
          <button class="btn ${p.recebido?'btn-g':'btn-v'} btn-sm" style="flex:1" onclick="marcarRecebido('${p.id}',${p.recebido?'false':'true'})">
            ${p.recebido?'↩ A receber':'✓ Recebido'}</button>
          ${ehAdmin&&!p.recebido&&pixConfigurado()?`<button class="btn btn-o btn-sm" onclick="pixCobranca('${p.id}')">📱 Pix</button>`:""}
        </div>
      </div>`).join("");
  const faltaPagar=aprazo.filter(p=>!p.recebido||!/pago/i.test(p.situacao||""));
  const acoes=ehAdmin?`<div class="row" style="margin-bottom:10px">
    ${faltaPagar.length?`<button class="btn btn-v btn-sm" style="flex:1" onclick="marcarTodosPagos(true)">\u2713 Marcar ${faltaPagar.length} como pago(s)</button>`:'<div style="flex:1;font-size:12px;color:var(--verde);font-weight:700;text-align:center;padding:8px">\u2713 Todos os pedidos est\u00e3o como pagos</div>'}
    ${recebidos.length?`<button class="btn btn-g btn-sm" onclick="marcarTodosPagos(false)">\u21a9 Reabrir todos</button>`:""}
  </div>`:"";
  const busca=`<input class="inp" placeholder="\ud83d\udd0d Buscar por cliente ou n\u00ba" value="${esc(buscaCobr)}" oninput="buscaCobr=this.value;render()" style="margin-bottom:8px">`;
  return `<h2 class="tit">Cobran\u00e7as</h2>${kpis}${chips}${busca}${acoes}${lista}
    <div id="cobrProg" style="font-size:12px;color:var(--cinza);margin-top:8px"></div>`;
}
async function marcarTodosPagos(valor){
  if(!ehAdmin){toast("Somente o administrador");return;}
  const alvo=pedidosVis().filter(p=>!p._pendente&&(p.status||"Pedido")!=="Or\u00e7amento"&&(!!p.recebido!==valor||(valor&&!/pago/i.test(p.situacao||""))));
  if(!alvo.length){toast("Nada a alterar");return;}
  if(!confirm((valor?"Marcar ":"Reabrir ")+alvo.length+" pedido(s)"+(valor?" como pago(s)?":"?")))return;
  const el=document.getElementById("cobrProg");
  try{
    let feitos=0;
    for(let i=0;i<alvo.length;i+=300){
      const upd={};
      alvo.slice(i,i+300).forEach(p=>{
        upd[p.id+"/recebido"]=valor;
        if(valor)upd[p.id+"/situacao"]="Pago";
        else if(/pago/i.test(p.situacao||""))upd[p.id+"/situacao"]="Pendente";
      });
      await db.ref("pedidos").update(upd);
      feitos+=Object.keys(upd).length;
      if(el)el.textContent=feitos+" de "+alvo.length+"\u2026";
    }
    toast(feitos+" pedido(s) atualizados \u2713");render();
  }catch(e){if(el)el.textContent="N\u00e3o foi poss\u00edvel concluir. Tente novamente.";}
}
function marcarRecebido(id,val){
  const p=pedidos.find(x=>x.id===id);
  if(p&&p._pendente){toast("Pedido ainda não sincronizado");return;}
  if(navigator.onLine)db.ref("pedidos/"+id+"/recebido").set(val);
  else{filaPendentes.push({col:"pedidos",op:"update",id:id,data:{recebido:val}});const pr=pedidosRemoto.find(x=>x.id===id);if(pr)pr.recebido=val;LS.set("fila",filaPendentes);reconstruirPedidos();render();}
}

    const t=dt(a); const atrasado=!a.feito&&t<hoje0; const ehHoje=t>=hoje0&&t<amanha0;
    const cor=a.feito?"#9ca3af":atrasado?"#dc2626":ehHoje?"var(--dourado)":"var(--verde)";
    return `<div class="card" style="padding:12px;border-left:4px solid ${cor}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">

function refDest(){return catRepEdit?("catalogo/reps/"+catRepEdit+"/destaques"):"catalogo/destaques";}
function gravarDest(arr){if(catRepEdit){const reps={...((cfgCatalogo||{}).reps||{})};reps[catRepEdit]={...(reps[catRepEdit]||{}),destaques:arr};cfgCatalogo={...cfgCatalogo,reps};}else{cfgCatalogo={...cfgCatalogo,destaques:arr};}db.ref(refDest()).set(arr);}
function slugRep(r){return String(r||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
function nomeLogo(r){return "logos/"+slugRep(r)+".png";}
function ehPrincipal(r){const n=String(r||"").trim().toUpperCase();return !n||n==="EIKO VIDA"||n===String(empresa.razao||"").trim().toUpperCase();}
function fontesLogo(r){
  const x=repDe(r), s=slugRep(r), f=[];
  if(x.logo)f.push(x.logo);
  if(s)f.push("logos/"+s+".png","logos/"+s+".jpg","logo-"+s+".png");
  if(ehPrincipal(r))f.push("simbolo.png","logo.png");
  return f;
}
function salvarCatalogoCfg(){
  const atual=cfgDoCatalogo();
  const o={whatsapp:val("ccWhats"),telefone:val("ccFone"),titulo:val("ccTitulo"),subtitulo:val("ccSub"),
    selos:val("ccSelos"),pitchTitulo:val("ccPitch"),beneficios:val("ccBenef"),
    destaques:atual.destaques||[]};
  if(catRepEdit){
    const reps={...((cfgCatalogo||{}).reps||{})};reps[catRepEdit]={...(reps[catRepEdit]||{}),...o};
    cfgCatalogo={...cfgCatalogo,reps};
    db.ref("catalogo/reps/"+catRepEdit).update(o);
    toast("Catálogo da "+catRepEdit+" atualizado ✓");
  }else{
    cfgCatalogo={...cfgCatalogo,...o};
    db.ref("catalogo").update(o);
    toast("Catálogo atualizado ✓");
  }
}
async function mostrarNoCatalogo(rep){
  const alvo=produtos.filter(p=>(p.marca||"EIKO VIDA")===rep&&p.catalogo===false);
  if(!alvo.length){toast("Nenhum produto oculto");return;}
  if(!confirm("Mostrar "+alvo.length+" produto(s) da "+rep+" no catálogo virtual?"))return;
  try{
    const upd={};alvo.forEach(p=>{upd[p.id+"/catalogo"]=true;});
    await db.ref("produtos").update(upd);
    toast(alvo.length+" produto(s) liberado(s) ✓");render();
  }catch(e){toast("Não foi possível concluir. Tente novamente.");}
}

function destaquesAtuais(){const c=cfgDoCatalogo();return Array.isArray(c.destaques)?c.destaques:[];}
function salvarDestaque(){
  const t=val("dsTit");
  if(!t){toast("Informe o título");return;}
  const d={tipo:val("dsTipo"),titulo:t,texto:val("dsTxt"),preco:val("dsPreco"),precoDe:val("dsDe"),
    imagem:fotoDest||"",ativo:!!(document.getElementById("dsAtivo")||{}).checked};

function moverDestaque(i,d){
  const arr=destaquesAtuais().slice();const j=i+d;
  if(j<0||j>=arr.length)return;
  const t=arr[i];arr[i]=arr[j];arr[j]=t;
  gravarDest(arr);render();
}
function lerFotoDest(inp){
  const f=inp.files&&inp.files[0]; if(!f)return;
  toast("Preparando imagem…");
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=900;let w=img.naturalWidth,h=img.naturalHeight;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;} else if(h>=w&&h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      const ctx=cv.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
      let q=0.72,dados=cv.toDataURL("image/jpeg",q);
      while(dados.length>150000&&q>0.35){q-=0.1;dados=cv.toDataURL("image/jpeg",q);}
      fotoDest=dados;render();toast("Imagem pronta ✓");
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
}

  const mes0=new Date();mes0.setDate(1);mes0.setHours(0,0,0,0);

function abrirTransferencia(id){transfDe=(transfDe===id?null:id);render();}
async function confirmarTransferencia(idDe){
  const de=equipe.find(v=>v.id===idDe); if(!de)return;
  const idPara=val("transfPara"); if(!idPara){toast("Escolha o vendedor de destino");return;}
  const para=equipe.find(v=>v.id===idPara); if(!para)return;
  if(!navigator.onLine){toast("Precisa estar online");return;}
  const alvo=clientes.filter(c=>padCod(c.vendedorCodigo)===padCod(de.codigo));
  if(!alvo.length){toast("Esse vendedor não tem clientes na carteira");return;}
  if(!confirm("Transferir "+alvo.length+" cliente(s)\n\nDe: "+de.nome+" (cód "+padCod(de.codigo)+")\nPara: "+para.nome+" (cód "+padCod(para.codigo)+")\n\nOs clientes continuam na base geral da empresa. Continuar?"))return;
  const set=t=>{const p=document.getElementById("transfProg");if(p)p.innerHTML=t;};
  try{
    const TAM=300;
    for(let i=0;i<alvo.length;i+=TAM){
      const upd={};
      alvo.slice(i,i+TAM).forEach(c=>{upd[c.id+"/vendedorCodigo"]=padCod(para.codigo);upd[c.id+"/vendedorNome"]=para.nome;});
      await db.ref("clientes").update(upd);
      set("⏳ Transferindo… <b>"+Math.min(i+TAM,alvo.length)+"/"+alvo.length+"</b>");
    }
    set('<span style="color:var(--verde)">✅ '+alvo.length+" cliente(s) transferido(s)</span>");
    toast("Carteira transferida ✓");
    transfDe=null;setTimeout(()=>render(),1400);
  }catch(e){set('<span style="color:#dc2626">Não foi possível concluir</span>');}
}

function salvarVend(){
  const o={nome:val("veNome"),meta:parseFloat(String(val("veMeta")).replace(/\./g,'').replace(',','.'))||0};
  if(!o.nome){toast("Informe o nome");return;}
  if(!ehAdmin){toast("Somente o administrador pode cadastrar vendedores");return;}
  const senha=String(val("veSenha")||"").trim();
  if(!vendEdit&&!/^\d{6}$/.test(senha)){toast("Defina a senha de 6 dígitos");return;}
  if(senha&&!/^\d{6}$/.test(senha)){toast("A senha deve ter 6 dígitos");return;}
  if(senha)o.senha=senha;
  const marcadas=[];
  try{document.querySelectorAll(".permChk").forEach(ch=>{if(ch.checked)marcadas.push(ch.value);});}catch(e){}
  o.permissoes=marcadas.length?marcadas:ABAS_PADRAO.slice();
  const reps=[];
  try{document.querySelectorAll(".repChk").forEach(ch=>{if(ch.checked)reps.push(ch.value);});}catch(e){}
  o.representadas=reps;
  const cats=[];
  try{document.querySelectorAll(".catChk").forEach(ch=>{if(ch.checked)cats.push(ch.value);});}catch(e){}
  o.catalogos=cats;
  const cids=[],bais=[];
  try{document.querySelectorAll(".cidChk").forEach(ch=>{if(ch.checked)cids.push(ch.value);});}catch(e){}
  try{document.querySelectorAll(".baiChk").forEach(ch=>{if(ch.checked)bais.push(ch.value);});}catch(e){}
  o.cidadesAtende=cids;
  o.bairrosAtende=bais;
  if(!vendEdit){o.codAtivacao=gerarCodAtivacao();o.ativado=false;}
  let cod=padCod(val("veCod"));
  if(!val("veCod")){
    const maior=equipe.reduce((m,x)=>Math.max(m,parseInt(padCod(x.codigo))||0),0);
    cod=padCod(String(maior+1));
  }
  if(equipe.some(x=>padCod(x.codigo)===cod&&(!vendEdit||x.id!==vendEdit.id))){toast("Já existe vendedor com o código "+cod);return;}
  o.codigo=cod;
  if(!vendEdit)o.ativo=true;
  if(navigator.onLine){if(vendEdit)db.ref("vendedores/"+vendEdit.id).update(o);else db.ref("vendedores").push(o);}
  else{if(vendEdit){const i=equipe.findIndex(x=>x.id===vendEdit.id);if(i>=0)equipe[i]={...equipe[i],...o};filaPendentes.push({col:"vendedores",op:"update",id:vendEdit.id,data:o});}else{const tempId="local_"+Date.now();equipe.push({id:tempId,...o});filaPendentes.push({col:"vendedores",op:"push",data:o,tempId});}LS.set("equipe",equipe);LS.set("fila",filaPendentes);}
  vendEdit=null;toast(navigator.onLine?"Vendedor salvo":"Salvo offline ✓");render();
}
function gerarCodAtivacao(){
  const L="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="EK";
  for(let i=0;i<4;i++)s+=L[Math.floor(Math.random()*L.length)];
  if(equipe.some(v=>v.codAtivacao===s))return gerarCodAtivacao();
  return s;
}

}

/* ====== IMPORTAÇÕES ====== */
let relPrev=null, relProdPrev=null;
function chavePed(p){return String(p.numero||"").trim()+"|"+repNorm(p.representada)+"|"+(Math.round((p.total||0)*100))+"|"+String(p.dataEmissao||p.data||"").slice(0,10);}
function pedidosDuplicados(){
  const grupos={};
  pedidos.filter(p=>!p._pendente).forEach(p=>{const k=chavePed(p);(grupos[k]=grupos[k]||[]).push(p);});
  const sobrando=[];
  Object.values(grupos).forEach(g=>{
    if(g.length<2)return;
    // mantém o mais completo: com itens primeiro, depois o mais antigo
    g.sort((a,b)=>(itensDe(b).length-itensDe(a).length)||String(a.id).localeCompare(String(b.id)));
    g.slice(1).forEach(p=>sobrando.push(p));
  });
  return sobrando;
}
async function limparPedidosDup(){
  const sobra=pedidosDuplicados();
  if(!sobra.length){toast("Nenhum pedido duplicado \u2713");return;}
  const valor=sobra.reduce((s,p)=>s+(p.total||0),0);
  if(!confirm("Encontrei "+sobra.length+" pedido(s) repetido(s), somando "+brl(valor)+" a mais nos relat\u00f3rios.\n\nApagar as c\u00f3pias e manter uma de cada?\n\nEsta a\u00e7\u00e3o n\u00e3o pode ser desfeita."))return;
  if(!confirm("Confirma apagar "+sobra.length+" c\u00f3pia(s)?"))return;
  const el=document.getElementById("relProg");
  try{
    let feitos=0;
    for(let i=0;i<sobra.length;i+=200){
      const upd={};
      sobra.slice(i,i+200).forEach(p=>{upd[p.id]=null;});
      await db.ref("pedidos").update(upd);
      feitos+=Object.keys(upd).length;
      if(el)el.textContent=feitos+" de "+sobra.length+" removidos\u2026";
    }
    toast(feitos+" c\u00f3pia(s) removida(s) \u2713");render();
  }catch(e){if(el)el.textContent="N\u00e3o foi poss\u00edvel concluir. Tente novamente.";}
}
function boxRelatorio(){
  const semItens=pedidos.filter(p=>!itensDe(p).length).length;
  const p1=relPrev?`<div style="background:#fff;border-radius:8px;padding:10px;margin-top:8px;font-size:13px">
      Encontrei <b style="color:var(--verde)">${relPrev.casam}</b> pedido(s) para completar (n\u00famero, representada e valor conferidos).

const PAD_TROCADO=/^\s*(?:([^-]{1,20}?)\s*-\s*)?(.*)$/;
function txtSimples(s){return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim().toUpperCase();}
let _cidadesCache=null;
function cidadesConhecidas(){
  if(_cidadesCache&&_cidadesCache.n===clientes.length)return _cidadesCache.lista;
  const set=new Set();
  clientes.forEach(c=>{const ci=String(c.cidade||"").trim(),uf=String(c.uf||"").trim();if(ci&&uf)set.add(txtSimples(ci+"/"+uf));});
  const lista=[...set].sort((a,b)=>b.length-a.length);
  _cidadesCache={n:clientes.length,lista};
  return lista;
}
function ehTrocado(p){
  return !String(p.numero||"").trim() && /^\d+$/.test(String(p.cliente||"").trim());
}
function separarNomeCidade(txt){
  const t=String(txt||"").trim();
  const alvo=txtSimples(t);
  for(const c of cidadesConhecidas()){
    if(alvo.endsWith(c)&&alvo.length>=c.length){
      const corte=t.length-c.length;
      return {nome:t.slice(0,corte).replace(/[\s\-,]+$/,""),cidade:t.slice(corte).trim(),cidadeConhecida:true};
    }
  }
  const m=/\s(\S+\/[A-Za-z]{2})\s*$/.exec(t);
  if(m)return {nome:t.slice(0,m.index).trim(),cidade:m[1],cidadeConhecida:false};
  if(/^\S+\/[A-Za-z]{2}$/.test(t))return {nome:"",cidade:t,cidadeConhecida:false};
  return {nome:t,cidade:"",cidadeConhecida:false};
}
function nomeSuspeito(n){
  const s=txtSimples(n);
  if(s.length<4)return true;
  return cidadesConhecidas().some(c=>c.startsWith(s));
}
function repararTrocado(p,r){
  const conserto={};
  const numero=String(p.cliente||"").trim();
  if(numero)conserto.numero=numero;
  const bruto=String(p.cidade||"").trim();
  const m=PAD_TROCADO.exec(bruto)||[];
  const cod=(m[1]||"").trim(), corpo=(m[2]||bruto).trim();
  const sep=separarNomeCidade(corpo);
  if(cod)conserto.clienteCodigo=cod;
  if(sep.cidade)conserto.cidade=sep.cidade;
  if(sep.nome&&!nomeSuspeito(sep.nome)){
    conserto.cliente=sep.nome;conserto.origemNome="pedido";
  }else if(r&&r.cliente){
    conserto.cliente=r.cliente;conserto.origemNome="relatorio";
    if(!sep.cidade&&corpo)conserto.cidade=corpo;
  }
  return conserto;
}
function indicePorDataValor(base){
  const ix={};
  Object.values(base).forEach(r=>{if(r.u)ix[r.emissao+"|"+r.total.toFixed(2)]=r;});
  return ix;
}
function acharNoRelatorio(p,base,ix){
  const k=String(p.numero||"").trim()+"|"+repNorm(p.representada);
  if(base[k])return base[k];
  const d=String(p.dataEmissao||p.data||"").slice(0,10);
  return (d&&ix[d+"|"+(p.total||0).toFixed(2)])||null;
}
async function conferirRelatorio(){
  const el=document.getElementById("relProg");
  if(el)el.textContent="Conferindo\u2026";
  try{
    const base=await baixarJson("itens-pedidos.json");
    const ix=indicePorDataValor(base);
    let casam=0,divergentes=0,jaTem=0,corrigeNum=0,nomeOk=0,nomeRel=0;const mapa={},nums={};
    pedidos.forEach(p=>{
      const r=acharNoRelatorio(p,base,ix);if(!r)return;
      if(itensDe(p).length){jaTem++;return;}
      if(Math.abs((p.total||0)-(r.total||0))>0.02||!r.ok){divergentes++;return;}
      mapa[p.id]=r.itens;casam++;
      if(ehTrocado(p)){
        const c=repararTrocado(p,r);
        if(!c.numero&&r.numero)c.numero=r.numero;
        if(Object.keys(c).length){nums[p.id]=c;corrigeNum++;if(c.origemNome==="pedido")nomeOk++;else if(c.origemNome==="relatorio")nomeRel++;}
      }else if(!String(p.numero||"").trim()&&r.numero){nums[p.id]={numero:r.numero};corrigeNum++;}
    });
    relPrev={casam,divergentes,jaTem,corrigeNum,nomeOk,nomeRel,mapa,nums};render();
  }catch(e){relPrev=null;const l=document.getElementById("relProg");if(l)l.textContent="N\u00e3o foi poss\u00edvel ler o relat\u00f3rio. Confira se o arquivo foi enviado.";}

      arr.push({codigo:c[0]||"",nome:c[1]||c[0],atacado:preco,varejo:preco,categoria:c[3]||"",estoque:c[4]||"",marca:"EIKO VIDA",embalagem:"UN/1",imagem:"",codbarras:""});

function chaveDup(c){
  const cnpj=soDig(c.cnpj||"");
  if(cnpj.length>=11)return "d:"+cnpj;
  return "n:"+String(c.nome||"").toLowerCase().replace(/\s+/g," ").trim()+"|"+String(c.cidade||"").toLowerCase().trim();
}
function contarDuplicados(){
  const vistos=new Set(); let dup=0;
  clientes.forEach(c=>{const k=chaveDup(c);if(vistos.has(k))dup++;else vistos.add(k);});
  return dup;
}
async function limparDuplicados(){
  if(!navigator.onLine){toast("Precisa estar online");return;}
  const vistos=new Map(), remover=[];
  clientes.forEach(c=>{
    const k=chaveDup(c);
    if(vistos.has(k)){
      // mantém o registro mais completo
      const antigo=vistos.get(k);
      const peso=x=>Object.values(x).filter(v=>v!==""&&v!=null).length;
      if(peso(c)>peso(antigo)){remover.push(antigo.id);vistos.set(k,c);}
      else remover.push(c.id);
    }else vistos.set(k,c);
  });
  if(!remover.length){toast("Nenhum duplicado encontrado ✓");return;}
  if(!confirm("Encontrei "+remover.length+" cliente(s) duplicado(s).\n\nVou manter "+vistos.size+" cliente(s) e remover as cópias.\n\nContinuar?"))return;
  const set=t=>{const p=document.getElementById("impProg");if(p)p.innerHTML=t;};
  const btn=document.getElementById("btnDup");if(btn)btn.disabled=true;
  try{
    const TAM=400;
    for(let i=0;i<remover.length;i+=TAM){
      const upd={};
      remover.slice(i,i+TAM).forEach(id=>{upd[id]=null;});
      await db.ref("clientes").update(upd);
      set("⏳ Removendo duplicados… <b>"+Math.min(i+TAM,remover.length)+"/"+remover.length+"</b>");
    }
    set("✅ Pronto! "+remover.length+" duplicado(s) removido(s). Restaram <b>"+vistos.size+"</b> clientes.");
    toast("Duplicados removidos ✓");
    setTimeout(()=>render(),1500);
  }catch(e){set('<span style=\'color:#dc2626\'>❌ Não foi possível concluir. Tente novamente.</span>');if(btn)btn.disabled=false;}
}
function normalizarBase(dados,nome){
  let cli=[],ped=[];
  if(Array.isArray(dados)){
    // lista simples: decide se é cliente ou pedido pelo formato
    const am=dados[0]||{};
    if(am.total!==undefined||am.numero!==undefined)ped=dados; else cli=dados;
  }else if(dados&&typeof dados==="object"){
    cli=dados.clientes||dados.clients||[];
    ped=dados.pedidos||dados.orders||[];
  }
  return {nome:nome,clientes:cli.filter(c=>c&&c.nome),pedidos:ped};
}
function lerArquivoBase(inp){
  const f=inp.files&&inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const base=normalizarBase(JSON.parse(r.result),f.name);
      if(!base.clientes.length&&!base.pedidos.length){toast("Arquivo sem clientes reconhecidos");return;}
      baseCarregada=base;modoImport="add";render();
    }catch(e){toast("Arquivo de base inválido");}
  };
  r.onerror=()=>toast("Não consegui ler o arquivo");
  r.readAsText(f);
}
async function carregarBaseSite(){
  const nome=(val("nomeBaseSite")||"").trim(); if(!nome){toast("Digite o nome do arquivo");return;}
  if(!navigator.onLine){toast("Precisa estar online");return;}
  const set=t=>{const p=document.getElementById("impProg");if(p)p.innerHTML=t;};
  set("⏳ Buscando "+esc(nome)+"…");
  try{
    const r=await fetch(nome+"?v="+Date.now());
    if(!r.ok)throw new Error("base não encontrada na central de dados");
    const base=normalizarBase(await r.json(),nome);
    if(!base.clientes.length&&!base.pedidos.length)throw new Error("arquivo sem clientes reconhecidos");
    baseCarregada=base;modoImport="add";set("");render();
  }catch(e){set('<span style="color:#dc2626">❌ '+"Tente novamente"+"</span>");}
}
async function confirmarBase(){
  if(!baseCarregada)return;
  if(importando){toast("Importação em andamento, aguarde…");return;}
  if(!navigator.onLine){toast("Precisa estar online");return;}
  const b=baseCarregada;
  const sub=modoImport==="sub";
  const aviso=sub
    ? "ATENÇÃO: isso APAGA os "+clientes.length+" clientes atuais e coloca os "+b.clientes.length+" desta base.\n\nContinuar?"
    : "Adicionar "+b.clientes.length+" cliente(s)"+(b.pedidos.length?" e "+b.pedidos.length+" pedido(s)":"")+" ao app?";
  if(!confirm(aviso))return;
  const set=t=>{const p=document.getElementById("impProg");if(p)p.innerHTML=t;};
  const btn=document.getElementById("btnCarga");if(btn)btn.disabled=true;
  importando=true;
  try{
    if(sub){set("⏳ Limpando base atual…");await db.ref("clientes").remove();}
    if(b.clientes.length)await gravarLotes("clientes",b.clientes,set,"clientes");
    if(b.pedidos.length)await gravarLotes("pedidos",b.pedidos,set,"pedidos");
    set("✅ Pronto! <b>"+b.clientes.length+"</b> cliente(s)"+(b.pedidos.length?" e <b>"+b.pedidos.length+"</b> pedido(s)":"")+" importado(s).");
    baseCarregada=null;importando=false;toast("Base importada ✓");
    setTimeout(()=>render(),1200);
  }catch(e){importando=false;set('<span style=\'color:#dc2626\'>❌ Não foi possível concluir. Tente novamente.</span>');if(btn)btn.disabled=false;}
}
async function gravarLotes(col,arr,set,label){
  const TAM=300;
  for(let i=0;i<arr.length;i+=TAM){
    const lote=arr.slice(i,i+TAM), upd={};
    lote.forEach(item=>{upd[db.ref(col).push().key]=item;});
    await db.ref(col).update(upd);
    set("⏳ Importando "+label+"… <b>"+Math.min(i+TAM,arr.length)+"/"+arr.length+"</b>");
  }
}

async function sincronizarSilencioso(){
  if(!navigator.onLine||!acessoPronto)return;
  ultimaSync=Date.now();
  try{
    if(filaPendentes.length){
      const fila=[...filaPendentes];
      fila.forEach(f=>{
        if(f.op==="update"&&f.id)db.ref(f.col+"/"+f.id).update(f.data);
        else if(f.op==="set")db.ref(f.col).set(f.data);
        else db.ref(f.col).push(f.data);
      });
      filaPendentes=[];LS.set("fila",[]);reconstruirPedidos();
    }
    LS.set("ultimaSync",ultimaSync);
    atualizarStatusRede();
    reRender(["central","home","sync","clientes","produtos","relatorios"]);
  }catch(e){}
}
function sincronizarAgora(){

function precoComTabela(p){
  const base=Number(p.atacado)||0;
  const t=tabelas.find(x=>x.nome===ped.tabela&&(!x.representada||x.representada===(ped.representada||"EIKO VIDA")))
        ||tabelas.find(x=>x.nome===ped.tabela);
  if(!t)return base;
  const cod=String(p.codigo||"").trim().toUpperCase();
  if(t.precos&&cod&&t.precos[cod]!=null&&t.precos[cod]!=="")return Number(t.precos[cod])||0;
  if(t.tipo==="precos")return base;
  const perc=parseFloat(t.percentual)||0;
  return t.tipo==="desconto"?base*(1-perc/100):base*(1+perc/100);
}
function tabelasDaRepres(r){
  const alvo=r||"EIKO VIDA";
  return tabelas.filter(t=>!t.representada||t.representada===alvo);
}
function calcTotais(){
  const bruto=Object.entries(carrinho).reduce((s,[id,it])=>s+(it.qtd*it.preco),0);
  const perc=parseFloat(ped.descPerc)||0;
  const total=ped.descTipo==="desc"?bruto*(1-perc/100):bruto*(1+perc/100);
  const qtd=Object.values(carrinho).reduce((s,it)=>s+it.qtd,0);
  return {bruto,total,qtd,perc};
}
function upd(campo,valor){
  if(campo==="representada"&&valor!==ped.representada){
    const fora=Object.keys(carrinho).filter(id=>{const p=produtos.find(x=>x.id===id);return p&&(p.marca||"EIKO VIDA")!==valor;});
    if(fora.length){
      if(!confirm("Trocar para "+valor+" vai remover "+fora.length+" item(ns) de outra representada do pedido. Continuar?")){render();return;}
      fora.forEach(id=>delete carrinho[id]);
    }
    ped.tabela="";
  }
  ped[campo]=valor;
  if(campo==="representada")render();
}

  if(!clienteSel){toast("Escolha um cliente");subAbaPedido="cab";render();return;}

  if(linhas.length===0){toast("Adicione itens");subAbaPedido="itens";render();return;}
  const cli=clientes.find(c=>c.id===clienteSel);
  const itens=linhas.map(([id,it])=>{const p=produtos.find(x=>x.id===id);return{nome:p.nome,codigo:p.codigo||"",qtd:it.qtd,preco:it.preco};});
  const {bruto,total}=calcTotais();
  const numero=editandoPedido?editandoPedido.numero:(pedidos.reduce((m,p)=>Math.max(m,p.numero||0),1000)+1);
  const pedido={
    numero,
    clienteId:clienteSel,cliente:cli.nome,cidade:cli.cidade||"",whats:cli.whatsapp||"",categoria:cli.categoria||"",
    vendedor,vendedorCodigo,itens,bruto,total,representada:ped.representada||"EIKO VIDA",
    status:"aberto",tipo:ped.status,cond:ped.cond,forma:ped.forma,tabela:ped.tabela||"",
    descTipo:ped.descTipo,descPerc:parseFloat(ped.descPerc)||0,
    consumidorFinal:ped.consumidorFinal,dataEmissao:ped.dataEmissao,dataFat:ped.dataFat,previsao:ped.previsao,
    obsCli:ped.obsCli,obsEmp:ped.obsEmp,ordemCompra:ped.ordemCompra,transportadora:ped.transportadora,
    data:new Date().toISOString()
  };
  if(editandoPedido){
    const alvo=pedidos.find(p=>p.id===editandoPedido.id)||{};
    pedido.data=alvo.data||pedido.data;
    pedido.editadoEm=new Date().toISOString();
    pedido.editadoPor=vendedor;
    if(editandoPedido.pendente){
      // ainda na fila: atualiza o item pendente
      const f=filaPendentes.find(x=>x.tempId===editandoPedido.id||x.tempId===editandoPedido.tempId);
      if(f)f.data={...f.data,...pedido};
      LS.set("fila",filaPendentes);
      reconstruirPedidos();

function placePix(t){return {email:"nome@dominio.com",cnpj:"00.000.000/0000-00",cpf:"000.000.000-00",celular:"(00) 00000-0000",aleatoria:"cole a chave do seu banco"}[t]||"sua chave";}

function normalizarChavePix(tipo,chave){
  const raw=String(chave||"").trim();
  const dig=raw.replace(/\D/g,"");
  if(tipo==="cpf")return dig.slice(0,11);
  if(tipo==="cnpj")return dig.slice(0,14);
  if(tipo==="celular"){const d=dig.replace(/^0+/,"");return "+55"+d.replace(/^55/,"").slice(0,11);}
  if(tipo==="email")return raw.toLowerCase();
  if(tipo==="aleatoria")return raw.toLowerCase();
  return raw;
}
function validarChavePix(tipo,chave){
  const c=normalizarChavePix(tipo,chave);
  if(tipo==="cpf")return c.length===11;
  if(tipo==="cnpj")return c.length===14;
  if(tipo==="celular")return /^\+55\d{10,11}$/.test(c);
  if(tipo==="email")return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(c);
  if(tipo==="aleatoria")return /^[0-9a-f]{8}-?[0-9a-f]{4}-?[0-9a-f]{4}-?[0-9a-f]{4}-?[0-9a-f]{12}$/.test(c);
  return !!c;
}
function pixCfg(){
  return {
    chave:String((empresa.pixChave||"")).trim(),
    tipo:String(empresa.pixTipo||"email"),
    nome:String((empresa.pixNome||empresa.razao||"EIKO VIDA")).trim(),
    cidade:String((empresa.pixCidade||empresa.cidade||"RECIFE")).trim()
  };
}
function pixConfigurado(){return !!pixCfg().chave;}
function _emv(id,valor){const s=String(valor);return id+String(s.length).padStart(2,"0")+s;}
function _semAcento(s){return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\x20-\x7E]/g,"").trim();}
function _crc16(str){
  let crc=0xFFFF;
  for(let i=0;i<str.length;i++){
    crc^=str.charCodeAt(i)<<8;
    for(let j=0;j<8;j++){crc=(crc&0x8000)?((crc<<1)^0x1021):(crc<<1);crc&=0xFFFF;}
  }
  return crc.toString(16).toUpperCase().padStart(4,"0");
}
function gerarBRCode(valor,txtId){
  const c=pixCfg();
  if(!c.chave)return "";
  const nome=_semAcento(c.nome).slice(0,25)||"EIKO VIDA";
  const cidade=_semAcento(c.cidade).slice(0,15).toUpperCase()||"RECIFE";
  const gui=_emv("00","BR.GOV.BCB.PIX");
  const chave=_emv("01",c.chave);
  const mai=_emv("26",gui+chave);
  const valorTxt=(valor&&Number(valor)>0)?_emv("54",Number(valor).toFixed(2)):"";
  const ref=_semAcento(txtId||"").replace(/[^A-Za-z0-9]/g,"").slice(0,25)||"***";
  const adic=_emv("62",_emv("05",ref));
  let payload=_emv("00","01")+mai+_emv("52","0000")+_emv("53","986")+valorTxt+_emv("58","BR")+_emv("59",nome)+_emv("60",cidade)+adic+"6304";
  return payload+_crc16(payload);
}

  const html=`<div class="sheet-ov" onclick="fecharPix()"></div>

function carregarLogo(rep){
  const fontes=rep?fontesLogo(rep).slice():[];
  if(!fontes.includes("logo.png"))fontes.push("logo.png");
  return new Promise(res=>{
    let i=0;
    const tenta=()=>{
      if(i>=fontes.length)return res(null);
      const img=new Image(); img.crossOrigin="anonymous";
      img.onload=()=>{try{const cv=document.createElement("canvas");cv.width=img.naturalWidth;cv.height=img.naturalHeight;cv.getContext("2d").drawImage(img,0,0);res({data:cv.toDataURL("image/png"),w:img.naturalWidth,h:img.naturalHeight});}catch(e){i++;tenta();}};
      img.onerror=()=>{i++;tenta();};
      img.src=fontes[i];
    };
    tenta();
  });
}
function carregarLogoAntigo(){

}

async function enviarPDFwhats(id){
  const o=pedidos.find(x=>x.id===id); if(!o)return;
  if(!window.jspdf||!window.jspdf.jsPDF){toast("Sem conexão — conecte para gerar o PDF");return;}
  toast("Gerando PDF…");
  let logo=null; try{logo=await carregarLogo(o.representada);}catch(_){ }
  let doc; try{doc=construirPDFjs(id,logo);}catch(e){toast("Erro ao gerar PDF");return;}
  if(!doc){toast("Erro ao gerar PDF");return;}
  const num=o.numero||id;
  const blob=doc.output("blob");
  const file=new File([blob],"Pedido-"+num+".pdf",{type:"application/pdf"});
  const legenda="Segue seu pedido "+num+" — "+(empresa.razao||"EIKO VIDA");
  try{
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"Pedido "+num,text:legenda});
    }else{
      doc.save("Pedido-"+num+".pdf");
      const alvo=soDig(o.whats)?("55"+soDig(o.whats).replace(/^55/,"")):WHATS_EMPRESA;
      setTimeout(()=>{window.open("https://wa.me/"+alvo+"?text="+encodeURIComponent(legenda+" (anexe o PDF que acabou de baixar)."),"_blank");},600);
      toast("PDF baixado — anexe no WhatsApp");
    }
  }catch(e){ if(e&&e.name==="AbortError")return; toast("Não consegui compartilhar. PDF será baixado."); try{doc.save("Pedido-"+num+".pdf");}catch(_){ } }
}

function htmlListaClientes(){
  const q=(buscaCli||"").toLowerCase().trim();

  if(escopoCli==="meus")lista=lista.filter(c=>String(c.vendedorCodigo||"")===String(vendedorCodigo));
  if(q)lista=lista.filter(c=>((c.nome||"")+" "+(c.fantasia||"")+" "+(c.cidade||"")+" "+(c.cnpj||"")).toLowerCase().includes(q));
  const total=lista.length, LIM=60;
  lista=lista.slice().sort((a,b)=>(a.nome||"").localeCompare(b.nome||""));
  const mostra=lista.slice(0,LIM);
  if(total===0)return `<div class="vazio"><div class="em">👥</div><div>Nenhum cliente encontrado.</div></div>`;
  const cards=mostra.map(c=>`<div class="lista-cli" onclick="verCliente('${c.id}')"><div class="info"><b>${esc(c.nome)}</b>
        <small>${[esc(c.cidade),esc(c.whatsapp)].filter(Boolean).join(" · ")}${c.vendedorCodigo?` · <span style="color:var(--verde)">cód ${esc(c.vendedorCodigo)}</span>`:""}</small></div>
        ${c.categoria?`<span class="badge b-cat">${esc(limpaCat(c.categoria))}</span>`:""}
        <button class="icbtn btn-g" onclick="event.stopPropagation();editarCli('${c.id}')">✎</button></div>`).join("");
  const aviso=total>LIM?`<div style="text-align:center;color:var(--cinza);font-size:12px;padding:12px">Mostrando ${LIM} de ${total}. Use a busca para achar outros.</div>`:"";
  return cards+aviso;
}

function lbxErr(img){

  if(resto.length){img.setAttribute("data-resto",resto.slice(1).join("|"));img.src=resto[0];
    const b=img.parentNode.querySelector(".lbx-bar");if(b)b.setAttribute("data-url",resto[0]);}
  else{fecharFoto();toast("Este produto ainda n\u00e3o tem foto");}

async function arquivoDaFoto(url,nome){
  const r=await fetch(url);const b=await r.blob();
  const ext=(b.type.split("/")[1]||"jpg").replace("jpeg","jpg");
  return new File([b],nome+"."+ext,{type:b.type||"image/jpeg"});
}
async function compartilharFoto(url,nome){
  try{
    const f=await arquivoDaFoto(url,nome);
    if(navigator.canShare&&navigator.canShare({files:[f]})){await navigator.share({files:[f],title:nome});return;}
    baixarFoto(url,nome);toast("Imagem baixada \u2014 anexe onde quiser");
  }catch(e){toast("N\u00e3o foi poss\u00edvel compartilhar. Tente baixar.");}
}
async function baixarFoto(url,nome){
  try{
    const f=await arquivoDaFoto(url,nome);
    const a=document.createElement("a");a.href=URL.createObjectURL(f);a.download=f.name;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    toast("Imagem baixada \u2713");
  }catch(e){toast("N\u00e3o foi poss\u00edvel baixar. Tente novamente.");}
}

function lerFoto(inp){
  const f=inp.files&&inp.files[0]; if(!f)return;
  toast("Preparando foto\u2026");
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      else if(h>=w&&h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      const ctx=cv.getContext("2d");
      ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      let q=0.72,dados=cv.toDataURL("image/jpeg",q);
      while(dados.length>140000&&q>0.35){q-=0.1;dados=cv.toDataURL("image/jpeg",q);}
      fotoTmp=dados;render();
      toast("Foto pronta \u2713 ("+Math.round(dados.length/1024)+" KB)");
    };
    img.onerror=()=>toast("N\u00e3o consegui abrir a imagem");
    img.src=r.result;
  };
  r.onerror=()=>toast("N\u00e3o consegui ler o arquivo");
  r.readAsDataURL(f);
}

  const tipo=(document.getElementById("tTipo")||{}).value||"acrescimo";
  const o={nome:val("tNome").trim(),tipo,representada:val("tRep")||"EIKO VIDA",
           percentual:parseFloat(String(val("tPerc")).replace(",","."))||0};
  if(!o.nome){toast("Informe o nome da tabela");return;}
  if(tipo==="precos"){
    const precos={};
    document.querySelectorAll(".tpreco").forEach(el=>{
      const v=String(el.value||"").trim();
      if(v!==""){const n=parseFloat(v.replace(/\./g,"").replace(",","."));if(!isNaN(n))precos[el.dataset.cod]=n;}
    });
    o.precos=precos;
  }else o.precos={};
  if(tabEdit&&tabEdit.id){db.ref("tabelas/"+tabEdit.id).update(o);tabEdit=null;toast("Tabela atualizada \u2713");}
  else{db.ref("tabelas").push(o);tabEdit=null;toast("Tabela criada \u2713");}
  render();
}
function editarTabela(id){tabEdit=tabelas.find(t=>t.id===id);render();window.scrollTo(0,0);}
function excluirTabela(id){if(!ehAdmin){toast("Somente o administrador");return;}const t=tabelas.find(x=>x.id===id);if(confirm("Excluir a tabela "+((t&&t.nome)||"")+"?"))db.ref("tabelas/"+id).remove();}

/* ====== SESSÃO: mantém o vendedor logado ao recarregar/atualizar ====== */
(function(){
  let n="",c="",id="",ad="",pm="";
  try{
    n=localStorage.getItem("eiko_vendedor")||"";
    c=localStorage.getItem("eiko_vcod")||"";
    id=localStorage.getItem("eiko_vid")||"";
    ad=localStorage.getItem("eiko_admin")||"0";
    pm=localStorage.getItem("eiko_perm")||"";
  }catch(e){}
  if(n&&c){
    vendedor=n;vendedorCodigo=c;vendedorId=id;ehAdmin=(ad==="1");
    try{permissoes=ehAdmin?null:(pm?JSON.parse(pm):ABAS_PADRAO.slice());}catch(e){permissoes=ABAS_PADRAO.slice();}
    document.getElementById("login").classList.add("hide");
    document.getElementById("app").classList.remove("hide");
    iniciar();iniciarAutoSync();
  }
})();

/* ====== PWA ====== */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;document.getElementById("instalar").classList.remove("hide");});
function instalarApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById("instalar").classList.add("hide");});}
window.addEventListener("appinstalled",()=>document.getElementById("instalar").classList.add("hide"));
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}

try{const v=localStorage.getItem("eiko_vendedor");if(v)document.getElementById("nomeVendedor").value=v;}catch(e){}
tentarLogo();
