<html lang="pt-BR">
<head>

<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--verde:#2F6B4F;--dourado:#C9A227;--bg:#faf9f6;--txt:#1f2320;--cinza:#6b7280;--borda:#e6e4de}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt);padding-bottom:96px}
  header{background:linear-gradient(135deg,var(--verde) 0%,#245240 100%);color:#fff;padding:26px 18px 22px;text-align:center;position:relative;overflow:hidden}
  header::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 10%,rgba(201,162,39,.22),transparent 55%)}
  header>*{position:relative;z-index:1}
  header img{width:76px;height:76px;object-fit:contain;background:#fff;border-radius:20px;padding:7px;box-shadow:0 6px 18px rgba(0,0,0,.18)}
  header h1{font-size:26px;letter-spacing:2px;margin-top:10px;font-weight:800}
  header .tag{font-size:13px;opacity:.95;margin-top:4px;line-height:1.4}
  .selos{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .selo{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:5px 11px;border-radius:20px;font-size:11.5px;font-weight:600}
  .pitch{background:#fff;margin:-14px 14px 0;border-radius:16px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,.07);position:relative;z-index:2}
  .pitch h2{font-size:16px;color:var(--verde);margin-bottom:8px}
  .benef{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .benef div{font-size:12.5px;line-height:1.45}
  .secTit{font-size:16px;font-weight:800;color:var(--verde);padding:20px 14px 8px}
  .dest{display:flex;gap:12px;overflow-x:auto;padding:0 14px 6px;scrollbar-width:none}
  .dest::-webkit-scrollbar{display:none}
  .dcard{min-width:232px;max-width:232px;background:#fff;border:2px solid var(--dourado);border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(201,162,39,.16)}
  .dcard .di{width:100%;aspect-ratio:16/9;background:#f4f3ef center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:30px}
  .dcard .dc{padding:11px}
  .dcard .dt{font-size:10.5px;font-weight:800;color:var(--dourado);text-transform:uppercase;letter-spacing:.4px}
  .dcard b{font-size:14px;line-height:1.3;display:block;margin-top:3px}
  .dcard p{font-size:12px;color:var(--cinza);line-height:1.4;margin-top:4px}
  .dcard .dp{margin-top:7px;font-size:18px;font-weight:800;color:var(--verde)}
  .dcard .dp s{font-size:12px;color:#aaa;font-weight:400;margin-right:5px}
  .barra{position:sticky;top:0;z-index:20;background:var(--bg);padding:12px 14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
  .busca{width:100%;padding:13px 15px;border:1px solid var(--borda);border-radius:12px;font-size:15px;background:#fff;outline:none}
  .busca:focus{border-color:var(--verde)}
  .cats{display:flex;gap:7px;overflow-x:auto;margin-top:10px;padding-bottom:3px;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat{white-space:nowrap;padding:8px 14px;border-radius:20px;border:1px solid var(--borda);background:#fff;font-size:13px;font-weight:600;color:#555;cursor:pointer}
  .cat.on{background:var(--verde);color:#fff;border-color:var(--verde)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;padding:0 14px 20px}
  .card{background:#fff;border:1px solid var(--borda);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .foto{aspect-ratio:1;background:#f4f3ef center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:38px;cursor:pointer}
  .card .info{padding:10px;display:flex;flex-direction:column;flex:1}
  .card .cd{font-size:10px;color:var(--cinza);font-weight:600}
  .card .nm{font-size:13px;font-weight:700;line-height:1.3;min-height:34px;cursor:pointer}
  .card .pr{margin-top:auto;padding-top:8px}
  .card .pr .v{font-size:17px;font-weight:800;color:var(--verde)}
  .card .pr .l{font-size:10px;color:var(--cinza);display:block}
  .add{margin-top:8px;width:100%;padding:9px;border:none;border-radius:9px;background:var(--verde);color:#fff;font-weight:700;font-size:13px;cursor:pointer}
  .qtd{display:flex;align-items:center;gap:8px;margin-top:8px}
  .qtd button{width:32px;height:32px;border-radius:8px;border:1px solid var(--borda);background:#fff;font-size:17px;font-weight:700;cursor:pointer;color:var(--verde)}
  .qtd span{flex:1;text-align:center;font-weight:800;font-size:15px}
  .vazio{text-align:center;padding:50px 20px;color:var(--cinza)}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none}
  .ov.on{display:block}
  .modal{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;z-index:51;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:.25s}
  .modal.on{transform:translateY(0)}
  @media(min-width:720px){
    .modal{left:50%;right:auto;bottom:auto;top:50%;width:560px;max-height:88vh;border-radius:18px;transform:translate(-50%,-45%) scale(.97);opacity:0;transition:.2s}
    .modal.on{transform:translate(-50%,-50%);opacity:1}
    .mfoto{height:230px}
  }
  .mfoto{width:100%;height:min(38vh,260px);background:#f4f3ef center/contain no-repeat;display:flex;align-items:center;justify-content:center;font-size:60px}
  .mrodape{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--borda);padding:12px 16px calc(12px + env(safe-area-inset-bottom));box-shadow:0 -3px 12px rgba(0,0,0,.08);z-index:3}
  .mbody{padding:16px}
  .mbody h3{font-size:19px;line-height:1.3}
  .mdesc{font-size:14px;color:#444;line-height:1.55;margin-top:8px}
  .ficha{margin-top:14px;border:1px solid var(--borda);border-radius:12px;overflow:hidden}
  .ficha .fl{display:flex;justify-content:space-between;gap:10px;padding:10px 13px;font-size:13px;border-bottom:1px solid #f2f1ed}
  .ficha .fl:last-child{border-bottom:none}
  .ficha .fl span{color:var(--cinza)}
  .ficha .fl b{text-align:right;word-break:break-word}
  .mpreco{background:#f2f9f2;border-radius:12px;padding:13px;margin-top:14px;text-align:center}
  .mpreco .l{font-size:11px;color:var(--cinza);display:block}
  .mpreco .v{font-size:26px;font-weight:800;color:var(--verde)}
  .fechar{position:sticky;top:0;background:#fff;padding:12px 16px;border-bottom:1px solid var(--borda);display:flex;justify-content:space-between;align-items:center;font-weight:700;z-index:2}
  .fechar button{background:none;border:none;font-size:26px;color:#999;cursor:pointer;line-height:1}
  .campo{width:100%;padding:12px;border:1px solid var(--borda);border-radius:10px;font-size:15px;margin-top:4px;font-family:inherit;outline:none}
  .campo:focus{border-color:var(--verde)}
  .lbl{font-size:12px;color:var(--cinza);font-weight:600;display:block;margin-top:11px}
  .resItem{display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid #f2f1ed;font-size:13px}
  .btnV{width:100%;padding:15px;border:none;border-radius:12px;background:var(--verde);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:14px}
  .btnW{width:100%;padding:15px;border:none;border-radius:12px;background:#25D366;color:#fff;font-size:16px;font-weight:800;cursor:pointer}
  .barraCar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--borda);padding:12px 14px calc(12px + env(safe-area-inset-bottom));box-shadow:0 -4px 16px rgba(0,0,0,.1);z-index:30;transform:translateY(130%);transition:.25s}
  .barraCar.on{transform:translateY(0)}
  .barraCar .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;font-size:13px;color:var(--cinza)}
  .barraCar .top b{font-size:20px;color:var(--verde)}
  .flut{position:fixed;right:16px;bottom:18px;z-index:25;background:#25D366;color:#fff;border:none;border-radius:50px;padding:14px 20px;font-weight:800;font-size:15px;box-shadow:0 6px 20px rgba(37,211,102,.4);cursor:pointer}
  footer{text-align:center;padding:24px 18px 30px;color:var(--cinza);font-size:12px;line-height:1.7}
  footer b{color:var(--verde)}
  .load{text-align:center;padding:60px 20px;color:var(--cinza)}
  .ok{text-align:center;padding:34px 20px}
  .ok .ic{font-size:56px}

  /* galeria de fotos */
  .foto .fimg{width:100%;height:100%;object-fit:cover;display:block}
  .mfoto{position:relative;overflow:hidden}
  .mfoto .gimg{width:100%;height:100%;object-fit:contain;display:block}
  .gseta{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.92);color:var(--verde);font-size:24px;line-height:1;font-weight:800;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;padding:0}
  .ge{left:10px}.gd{right:10px}
  .gpontos{position:absolute;left:0;right:0;bottom:8px;display:flex;gap:6px;justify-content:center}
  .gp{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.18);cursor:pointer}
  .gp.on{background:var(--verde)}
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="EIKO VIDA" onerror="this.style.display='none'">
  <h1 id="hTitulo">EIKO VIDA</h1>
  <div class="tag" id="hSub">Óleos vegetais 100% naturais · Linha completa para revenda</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
const CFG={apiKey:"AIzaSyCzl-w2jUWYGvMD2t5JfeW2l0iGjZt8cRw",authDomain:"eiko-vida-app.firebaseapp.com",databaseURL:"https://eiko-vida-app-default-rtdb.firebaseio.com",projectId:"eiko-vida-app",storageBucket:"eiko-vida-app.firebasestorage.app",messagingSenderId:"805340801526",appId:"1:805340801526:web:50e800c3a5ada35594ffd7"};
const WHATS_PADRAO="558141410577";
firebase.initializeApp(CFG);
const db=firebase.database();

/* ====== ACESSO SEGURO A NUVEM (identificacao automatica do aparelho) ====== */
let acessoPronto=false;const acessoFila=[];
function quandoAcesso(fn){if(acessoPronto){try{fn();}catch(e){}}else acessoFila.push(fn);}
function aguardarAcesso(ms){return new Promise(r=>{if(acessoPronto)return r(true);const t=setTimeout(()=>r(acessoPronto),ms||8000);acessoFila.push(()=>{clearTimeout(t);r(true);});});}
(function(){
  function liberar(){if(acessoPronto)return;acessoPronto=true;acessoFila.splice(0).forEach(f=>{try{f();}catch(e){}});}
  function tentar(){try{firebase.auth().signInAnonymously().catch(()=>setTimeout(tentar,8000));}catch(e){setTimeout(tentar,8000);}}
  try{firebase.auth().onAuthStateChanged(u=>{if(u)liberar();else tentar();});}catch(e){liberar();}
})();


let produtos=[],empresa={},cfg={},cat="",carrinho={},prodAberto=null;
const REPRES=(()=>{try{const r=new URLSearchParams(location.search).get("r");return r&&r.toUpperCase()!=="TODAS"?r.trim():"";}catch(e){return "";}})();
function daRepres(p){return !REPRES||String(p.marca||"EIKO VIDA").trim().toUpperCase()===REPRES.toUpperCase();}
let clientes=[],cliIdent=null,modoCad="escolha",pedidoAtual=null,unsubPed=null;
const brl=n=>"R$ "+(Number(n)||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const digitos=s=>String(s||"").replace(/\D/g,"");
function zap(){const n=digitos((typeof cfgRep==="function"&&cfgRep().whatsapp)||cfg.whatsapp||empresa.whats||WHATS_PADRAO);return n.length<=11?"55"+n:n;}

function conectarNuvem(){
db.ref("produtos").on("value",s=>{
  const v=s.val()||{};
  produtos=Object.keys(v).map(k=>({id:k,...v[k]})).filter(p=>p.nome&&p.catalogo!==false&&daRepres(p));
  montarCats();filtrar();
});
db.ref("clientes").on("value",s=>{const v=s.val()||{};clientes=Object.keys(v).map(k=>({id:k,...v[k]}));});
db.ref("empresa").on("value",s=>{empresa=s.val()||{};rodape();});
db.ref("catalogo").on("value",s=>{cfg=s.val()||{};aplicarCfg();rodape();});
}
quandoAcesso(conectarNuvem);

function cfgRep(){
  const r=(cfg.reps&&REPRES)?(cfg.reps[REPRES]||cfg.reps[REPRES.toUpperCase()]||{}):{};
  return r||{};
}
function vlr(campo,padraoGeral){
  const r=cfgRep();
  if(REPRES)return r[campo]||"";
  return cfg[campo]||padraoGeral||"";
}
function aplicarCfg(){
  const r=cfgRep();
  const marca=REPRES||cfg.titulo||"EIKO VIDA";
  document.getElementById("hTitulo").textContent=vlr("titulo")||marca;
  if(REPRES)document.title=marca+" \u2014 Cat\u00e1logo de Atacado";
  const sub=vlr("subtitulo");
  document.getElementById("hSub").textContent=sub||(REPRES?"Linha completa para revenda":"\u00d3leos vegetais 100% naturais \u00b7 Linha completa para revenda");
  const pt=vlr("pitchTitulo");
  document.getElementById("hPitch").textContent=pt||("Por que revender "+marca+"?");
  // logotipo pr\u00f3prio da representada (logo-<nome>.png), com o geral como reserva
  const img=document.querySelector("header img");
  if(img){
    const alvo=r.logo||(REPRES?"logo-"+REPRES.toLowerCase().replace(/[^a-z0-9]+/g,"-")+".png":"logo.png");
    img.alt=marca;img.style.display="";
    img.onerror=function(){if(this.dataset.tentou)this.style.display="none";else{this.dataset.tentou="1";this.src="logo.png";}};
    img.src=alvo;
  }
  const selos=(vlr("selos")||"🌱 100% Vegano, 🧪 Registro ANVISA, 🇧🇷 Produção própria, 📦 Pronta entrega").split(",").map(x=>x.trim()).filter(Boolean);
  document.getElementById("hSelos").innerHTML=selos.map(x=>`<span class="selo">${esc(x)}</span>`).join("");
  const bens=(vlr("beneficios")||"💰 Margem de até 100% na revenda\n🔄 Alto giro — produto de recompra\n📈 Mercado natural em crescimento\n🤝 Suporte e material de apoio").split("\n").map(x=>x.trim()).filter(Boolean);
  document.getElementById("hBenef").innerHTML=bens.map(x=>`<div>${esc(x)}</div>`).join("");
  const fonteD=(REPRES&&Array.isArray(cfgRep().destaques))?cfgRep().destaques:(REPRES?[]:cfg.destaques);
  const ds=(Array.isArray(fonteD)?fonteD:[]).filter(d=>d&&d.ativo!==false&&d.titulo);
  document.getElementById("destaques").innerHTML=ds.length?
    `<div class="secTit">🔥 Destaques e promoções</div><div class="dest">`+ds.map(d=>`
      <div class="dcard">
        <div class="di" ${d.imagem?`style="background-image:url('${esc(d.imagem)}')"`:""}>${d.imagem?"":"🎁"}</div>
        <div class="dc">
          <div class="dt">${esc(d.tipo||"⭐ Destaque")}</div>
          <b>${esc(d.titulo)}</b>
          ${d.texto?`<p>${esc(d.texto)}</p>`:""}
          ${d.preco?`<div class="dp">${d.precoDe?`<s>R$ ${esc(d.precoDe)}</s>`:""}R$ ${esc(d.preco)}</div>`:""}
        </div></div>`).join("")+`</div>`:"";
}
function rodape(){
  try{const e=document.getElementById("linkStatus");if(e&&localStorage.getItem("eiko_meupedido"))e.style.display="inline";}catch(x){}
  document.getElementById("fNome").textContent=REPRES||cfg.titulo||empresa.razao||"EIKO VIDA";
  document.getElementById("fContato").textContent=[cfgRep().telefone||cfg.telefone||empresa.telefone,REPRES?"":empresa.site].filter(Boolean).join(" · ");
}
function montarCats(){
  const cs=[...new Set(produtos.map(p=>p.categoria).filter(Boolean))].sort();
  document.getElementById("cats").innerHTML=
    `<button class="cat ${cat===""?"on":""}" onclick="setCat('')">Todos</button>`+
    cs.map(c=>`<button class="cat ${cat===c?"on":""}" onclick="setCat(&quot;${esc(c)}&quot;)">${esc(c)}</button>`).join("");
}
function setCat(c){cat=c;montarCats();filtrar();}
function filtrar(){
  const termo=(document.getElementById("busca").value||"").toLowerCase().trim();
  let lista=produtos.filter(p=>!cat||p.categoria===cat);
  if(termo)lista=lista.filter(p=>((p.nome||"")+" "+(p.codigo||"")+" "+(p.categoria||"")+" "+(p.descricao||"")+" "+(p.codbarras||"")).toLowerCase().includes(termo));
  lista.sort((a,b)=>(a.nome||"").localeCompare(b.nome||""));
  const el=document.getElementById("lista");
  if(!lista.length){el.innerHTML=`<div class="vazio"><div style="font-size:40px">🔍</div><div style="margin-top:8px">Nenhum produto encontrado.</div></div>`;return;}
  el.innerHTML=`<div class="grid">`+lista.map(p=>{
    const q=carrinho[p.id]||0;
    return `<div class="card">
      <div class="foto" onclick="verProduto('${p.id}')">${miniFoto(p)}</div>
      <div class="info">
        ${p.codigo?`<div class="cd">Cód. ${esc(p.codigo)}</div>`:""}
        <div class="nm" onclick="verProduto('${p.id}')">${esc(p.nome)}</div>
        <div class="pr"><span class="l">Atacado</span><span class="v">${brl(p.atacado)}</span></div>
        ${q?`<div class="qtd"><button onclick="mudar('${p.id}',-1)">−</button><span>${q}</span><button onclick="mudar('${p.id}',1)">+</button></div>`
           :`<button class="add" onclick="mudar('${p.id}',1)">+ Adicionar</button>`}
      </div></div>`;
  }).join("")+`</div>`;
}
/* ====== GALERIA DE FOTOS (pasta img/, arquivos nomeados pelo codigo) ====== */
const GAL_EXTS=["jpg","png","jpeg","webp"];
const galCache={};
let galFotos=[],galIdx=0,galUltimo=null;
function galUrl(cod,n,ext){return "img/"+encodeURIComponent(cod)+(n>1?"_"+n:"")+"."+ext;}
function galTesta(u){return new Promise(r=>{const i=new Image();i.onload=()=>r(true);i.onerror=()=>r(false);i.src=u;});}
async function galeriaDo(cod){
  cod=String(cod||"").trim();
  if(!cod)return [];
  if(galCache[cod])return galCache[cod];
  const fotos=[];
  for(let n=1;n<=8;n++){
    let ok=null;
    for(const e of GAL_EXTS){const u=galUrl(cod,n,e);if(await galTesta(u)){ok=u;break;}}
    if(!ok)break;
    fotos.push(ok);
  }
  galCache[cod]=fotos;
  return fotos;
}
function miniFoto(p){

  if(p.imagem)cadeia.push(p.imagem);

}
function fotoFallback(p){

function galErr(img){
  const resto=(img.getAttribute("data-resto")||"").split("|").filter(Boolean);
  if(resto.length){img.setAttribute("data-resto",resto.slice(1).join("|"));img.src=resto[0];}

async function montarGaleria(p){

  desenharGaleria();
}
function desenharGaleria(){
  const box=document.getElementById("galBox");
  if(!box||!galFotos.length)return;
  const varios=galFotos.length>1;
  box.innerHTML=`<img class="gimg" src="${esc(galFotos[galIdx])}" alt="">`+
    (varios?`<button class="gseta ge" onclick="galIr(-1)">\u2039</button><button class="gseta gd" onclick="galIr(1)">\u203a</button><div class="gpontos">${galFotos.map((_,i)=>`<span class="gp ${i===galIdx?"on":""}" onclick="galPara(${i})"></span>`).join("")}</div>`:"");
  if(varios){
    box.ontouchstart=e=>{box._tx=e.touches[0].clientX;};
    box.ontouchend=e=>{const dx=e.changedTouches[0].clientX-(box._tx||0);if(Math.abs(dx)>40)galIr(dx<0?1:-1);};
  }
}
function galIr(d){galIdx=(galIdx+d+galFotos.length)%galFotos.length;desenharGaleria();}
function galPara(i){galIdx=i;desenharGaleria();}

    return;

async function buscarReceita(){
  const d=digitos(document.getElementById("cCnpj").value);
  const msg=document.getElementById("rMsg");
  if(d.length!==14){msg.innerHTML='<span style="color:#b45309">Digite os 14 números do CNPJ.</span>';return;}
  const jaTem=clientes.find(c=>digitos(c.cnpj)===d);
  if(jaTem){cliIdent=jaTem;modoCad="confirma";renderCheckout();return;}
  msg.textContent="Buscando…";
  try{
    const r=await fetch("https://brasilapi.com.br/api/cnpj/v1/"+d);
    if(!r.ok)throw new Error("x");
    const j=await r.json();
    const set=(id,v)=>{const e=document.getElementById(id);if(e&&v)e.value=v;};
    set("cLoja",j.razao_social);set("cFant",j.nome_fantasia);
    set("cCep",j.cep);set("cEnd",[j.logradouro,j.numero].filter(Boolean).join(", "));
    set("cBairro",j.bairro);set("cCidade",j.municipio);set("cUf",j.uf);
    if(j.ddd_telefone_1)set("cFone",j.ddd_telefone_1);
    if(j.email)set("cEmail",j.email);
    msg.innerHTML='<span style="color:var(--verde)">✓ Dados preenchidos. Confira e complete.</span>';
  }catch(e){msg.innerHTML='<span style="color:#b45309">Não consegui buscar. Preencha manualmente.</span>';}
}

function baixarEspelho(){
  const o=pedidoAtual;if(!o){alert("Pedido não encontrado.");return;}
  if(!window.jspdf||!window.jspdf.jsPDF){alert("Não consegui gerar o PDF agora.");return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:"mm",format:"a4"});
  const M=14,W=182;let y=18;
  doc.setFont("helvetica","bold");doc.setFontSize(19);doc.setTextColor(47,107,79);
  doc.text(cfg.titulo||empresa.razao||"EIKO VIDA",105,y,{align:"center"});y+=6;
  doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(90);
  doc.text("Cópia do pedido — catálogo online",105,y,{align:"center"});y+=9;
  doc.setDrawColor(200);doc.line(M,y,M+W,y);y+=8;
  doc.setTextColor(0);doc.setFontSize(10);
  const dt=new Date(o.data);
  const lin=(a,b)=>{doc.setFont("helvetica","bold");doc.text(a,M,y);doc.setFont("helvetica","normal");
    doc.text(doc.splitTextToSize(String(b||"—"),W-38),M+36,y);y+=6;};
  lin("Data:",dt.toLocaleString("pt-BR"));
  lin("Loja:",o.cliente);
  lin("Contato:",o.contato);
  if(o.cnpj)lin("CNPJ/CPF:",o.cnpj);
  if(o.cidade)lin("Cidade:",o.cidade);
  if(o.endereco)lin("Entrega:",o.endereco);
  lin("Situação:",o.situacao||"Aguardando confirmação");
  y+=3;doc.line(M,y,M+W,y);y+=7;
  doc.setFont("helvetica","bold");doc.setFontSize(9);
  doc.text("CÓD.",M,y);doc.text("PRODUTO",M+20,y);doc.text("QTD",M+120,y,{align:"right"});
  doc.text("UNIT.",M+146,y,{align:"right"});doc.text("TOTAL",M+W,y,{align:"right"});y+=2;
  doc.line(M,y,M+W,y);y+=5;
  doc.setFont("helvetica","normal");
  (o.itens||[]).forEach(i=>{
    if(y>272){doc.addPage();y=20;}
    doc.text(String(i.codigo||""),M,y);
    doc.text(doc.splitTextToSize(String(i.nome||""),95)[0],M+20,y);
    doc.text(String(i.qtd),M+120,y,{align:"right"});
    doc.text(brl(i.preco),M+146,y,{align:"right"});
    doc.text(brl(i.qtd*i.preco),M+W,y,{align:"right"});
    y+=5.6;
  });
  y+=2;doc.line(M,y,M+W,y);y+=8;
  doc.setFont("helvetica","bold");doc.setFontSize(13);
  doc.text("TOTAL: "+brl(o.total),M+W,y,{align:"right"});y+=10;
  doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(90);
  const nota=doc.splitTextToSize("Forma e condição de pagamento serão combinadas com nossa equipe. Este documento é uma cópia do seu pedido, não é documento fiscal.",W);
  doc.text(nota,M,y);y+=nota.length*4.5+4;
  const ct=[cfg.telefone||empresa.telefone,empresa.site].filter(Boolean).join(" · ");
  if(ct)doc.text(ct,105,285,{align:"center"});
  doc.save("Pedido-"+(o.cliente||"catalogo").replace(/[^\w]/g,"_").slice(0,20)+".pdf");
}

      }catch(e){}
    }
    const passos=[["📝","Pedido enviado",true],["✅","Aceito pela empresa",aceito],["📦","Em separação",/separa|prepar/i.test(st)],["🚚","Enviado",/envi|transport|entreg/i.test(st)]];
    const permitir=(window.Notification&&Notification.permission!=="granted")
      ?`<button class="btnV" onclick="pedirAviso()">🔔 Quero ser avisado neste celular</button>`:
       `<div style="background:#f2f9f2;border-radius:10px;padding:10px;font-size:12.5px;color:#2F6B4F;margin-top:12px">🔔 Avisos ativados neste aparelho.</div>`;
    document.getElementById("statusBody").innerHTML=`<div class="mbody">
      <div style="text-align:center;padding:6px 0 14px">
        <div style="font-size:13px;color:var(--cinza)">Situação atual</div>
        <div style="font-size:20px;font-weight:800;color:${aceito?"var(--verde)":"#b45309"};margin-top:3px">${esc(st)}</div>
      </div>
      ${passos.map(p=>`<div style="display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #f2f1ed;opacity:${p[2]?1:.4}">
        <span style="font-size:20px">${p[0]}</span><b style="font-size:14px">${p[1]}</b>
        ${p[2]?'<span style="margin-left:auto;color:var(--verde);font-weight:800">✓</span>':""}</div>`).join("")}
      <div style="margin-top:14px;font-size:13px;color:var(--cinza)">Pedido de <b>${esc(o.cliente||"")}</b> · ${brl(o.total)}</div>
      ${permitir}
      <button class="btnV" style="background:#fff;color:var(--verde);border:2px solid var(--verde)" onclick="baixarEspelho()">📄 Baixar cópia do pedido</button>
      <button class="btnV" style="background:#eee;color:#555;margin-bottom:14px" onclick="fecharTudo()">Fechar</button>
    </div>`;
  });
  unsubPed=()=>ref.off("value",cb);
  });
}
function pedirAviso(){
  if(!window.Notification){alert("Seu navegador não suporta avisos.");return;}
  Notification.requestPermission().then(p=>{
    if(p==="granted"){try{new Notification("Avisos ativados ✓",{body:"Você será avisado quando seu pedido for confirmado.",icon:"icon-192.png"});}catch(e){}}
    abrirStatus();
  });
}
function abrirWhats(){
  const t="Olá! Vim pelo catálogo online e gostaria de mais informações sobre os produtos para revenda.";
  window.open("https://wa.me/"+zap()+"?text="+encodeURIComponent(t),"_blank");
}
</script>
